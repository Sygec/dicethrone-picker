name: Keep Supabase Dev Alive

on:
  schedule:
    # Run at midnight (0 0 * *) on Sunday (0) and Friday(5)
    - cron: '0 5 * * 0,5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Dev Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_DEV_URL }}/rest/v1/heroes?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_DEV_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_DEV_KEY }}"
