<!-- ========================================== -->
<!-- SECTION: Roll Randomizer                   -->
<!-- ========================================== -->
<section id="rollSection">
    <!-- Player Selection Toggles -->
    <div
        class="player-toggle-zone-top"
        id="player-toggle-zone-top"></div>

    <!-- Action Controls Wrapper -->
    <div class="roll-controls-wrapper">
        <div id="rollBtnContainer" class="roll-btn-container">
            <button
                id="rollBtn"
                type="button">
                ROLL RANDOMIZER
            </button>
            <button
                id="rollDraftBtn"
                type="button">
                DRAFT-3 RANDOMIZER
            </button>
            <button
                id="rollSettingsBtn"
                type="button"
                class="roll-settings-btn"
                aria-label="Roll settings"
                style="display: none;">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span id="roll-settings-badge" class="settings-badge" style="display: none;"></span>
            </button>
        </div>
        <div id="action-buttons" style="display: none; gap: 10px">
            <button
                id="cancelBtn"
                type="button"
                class="btn-cancelroll"
                style="flex: 1">
                CANCEL ROLL
            </button>
            <button
                id="confirmBtn"
                type="button"
                class="btn-confirm"
                style="flex: 2">
                LOCK IN SESSION
            </button>
        </div>
    </div>

    <!-- Randomizer Results Area -->
    <section id="results" class="results" aria-live="polite">
        <p class="picker-hint">
            Select players and roll.
        </p>
    </section>

    <!-- Validation Error Message -->
    <div id="error-msg" role="alert">
        ⚠ Duplicate hero selected! Each player must have a unique
        character.
    </div>
</section>
