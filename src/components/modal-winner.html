<!-- Winner Selection Modal -->
<div id="winner-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="winner-close"
            >&times;</span
        >
        <h2>Select Winner</h2>
        <div
            id="winner-selection-container"
            style="margin: 15px 0; overflow-y: auto; flex: 1;"></div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="button" class="btn-cancel" id="winner-cancel" style="flex: 1;">Cancel</button>
            <button type="button" class="btn-save" id="confirm-winner-btn" style="flex: 1;">Save Result</button>
        </div>
    </div>
</div>
