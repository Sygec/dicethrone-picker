<!-- ========================================== -->
<!-- SECTION: Hero Database & Stats             -->
<!-- ========================================== -->
<section id="dbSection" class="hidden">
    <!-- Search & Filtering -->
    <div class="search-container">
        <div class="search-wrapper">
            <input
                class="search-bar search-input"
                type="text"
                id="hero-search"
                placeholder="Search..."
                aria-label="Search heroes by name or group" />
            <div class="search-actions">
                <img
                    src="images/buttons/close.png"
                    id="clear-search"
                    class="search-icon hidden"
                    alt="Clear"
                    title="Clear Search" />
            </div>
            <button
                type="button"
                class="search-btn"
                id="hero-search-btn"
                aria-label="Search">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
        <div class="small-text" id="count-stats">
            Showing 0 of 0 heroes
        </div>

        <!-- Hidden inputs used by renderList for ownership filtering -->
        <input
            type="checkbox"
            id="db-show-owned"
            checked
            style="display: none" />
        <input
            type="checkbox"
            id="db-show-not-owned"
            style="display: none" />
    </div>

    <!-- Filter & Sort Action Bar -->
    <div class="filter-action-bar">
        <div class="sort-dropdown-container" id="sort-dropdown-container">
            <button
                type="button"
                class="btn-action-trigger"
                id="btn-trigger-sort"
                style="width: 100%;">
                <span class="action-icon">⇅</span> <strong style="font-weight: 700;">SORT:</strong> <span style="font-weight: 400; text-transform: none; margin-left: 2px;">Hero (A-Z)</span>
            </button>
            <div id="sort-dropdown-menu" class="sort-dropdown-menu"></div>
        </div>
        <button
            type="button"
            class="btn-action-trigger"
            id="btn-trigger-filter">
            <svg class="action-icon-svg" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right: 6px; vertical-align: middle;">
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="7" y1="12" x2="17" y2="12"></line>
                <line x1="10" y1="18" x2="14" y2="18"></line>
            </svg>Filter
            <span class="active-badge" id="filter-active-badge" style="display: none;">0</span>
        </button>
    </div>

    <!-- Active Filters Breadcrumbs Container -->
    <div class="active-filters-container" id="active-filters-container"></div>

    <div id="heroContainer"></div>
</section>
