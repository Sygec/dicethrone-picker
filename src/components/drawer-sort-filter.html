<!-- Component: Premium Bottom Settings Drawer for Sorting and Filtering -->
<div id="sort-filter-drawer" class="drawer-overlay">
    <div class="drawer-sheet">
        <div class="drawer-header">
            <span class="drawer-title" id="drawer-title-text">Sort & Filter</span>
            <button type="button" class="drawer-close-btn" id="drawer-close">&times;</button>
        </div>
        <div class="drawer-body" id="drawer-body-content">
            <!-- Loaded dynamically -->
        </div>
        <div class="drawer-footer" id="drawer-footer-content">
            <button type="button" class="btn-drawer-reset" id="drawer-reset">Reset All</button>
            <button type="button" class="btn-drawer-apply" id="drawer-apply">Apply</button>
        </div>
    </div>
</div>
