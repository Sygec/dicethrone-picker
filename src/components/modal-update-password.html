<!-- Update Password Modal -->
<div id="update-password-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" id="update-password-close"
            >&times;</span
        >
        <h2>Update Password</h2>
        <form
            id="update-password-form"
            autocomplete="off"
            style="
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-top: 10px;
            ">
            <!-- Hidden username field for accessibility and password managers -->
            <input
                type="text"
                id="update-password-username"
                name="username"
                autocomplete="username"
                style="display: none;" />
            <input
                name="new-password"
                type="password"
                id="new-password"
                autocomplete="new-password"
                placeholder="New Password"
                style="
                    font-size: 16px;
                    padding: 10px;
                    border-radius: 4px;
                    border: 1px solid #ccc;
                    color: var(--text);
                " />
            <button type="submit" class="btn-save">
                Update Password
            </button>
            <div
                id="update-password-error"
                style="
                    color: var(--danger);
                    font-size: 0.8rem;
                    text-align: center;
                    display: none;
                    margin-top: 5px;
                "></div>
        </form>
    </div>
</div>
