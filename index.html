<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne Randomizer</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 { text-align: center; color: var(--accent); margin-bottom: 10px; }

        .results {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            min-height: 120px;
            margin-bottom: 20px;
            border: 2px solid var(--secondary);
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: center;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-in;
        }

        .player-label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.7; }
        .character-name { font-weight: bold; color: var(--accent); font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-confirm { background: #28a745; grid-column: span 3; margin-top: 10px; display: none; }

        .manage-section {
            background: #0f346055;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }

        input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 5px;
            border: none;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
        }

        .char-list {
            margin-top: 10px;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #ffffff11;
        }

        .char-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ffffff11;
        }

        .char-info { display: flex; flex-direction: column; }
        .char-weight { font-size: 0.7rem; opacity: 0.5; }

        .btn-del-single {
            background: transparent;
            color: #ff4444;
            padding: 5px 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .danger-zone {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        .btn-danger { background: var(--danger); font-size: 0.75rem; padding: 10px; flex: 1; }
        .btn-neutral { background: #444; font-size: 0.75rem; padding: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Throne</h1>
    
    <div id="results" class="results">
        <p style="text-align: center; opacity: 0.6;">Select player count...</p>
    </div>

    <div class="controls">
        <button onclick="pickCharacters(2)">2P</button>
        <button onclick="pickCharacters(3)">3P</button>
        <button onclick="pickCharacters(4)">4P</button>
        <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">Lock in Selection</button>
    </div>

    <div class="manage-section">
        <h3>My Collection</h3>
        <div class="input-group">
            <input type="text" id="newName" placeholder="Hero Name...">
            <button onclick="addNewCharacter()" style="padding: 0 20px;">Add</button>
        </div>
        
        <div class="char-list" id="charList">
            </div>

        <div class="danger-zone">
            <button class="btn-neutral" onclick="resetWeights()">Reset Odds</button>
            <button class="btn-danger" onclick="clearCharacterList()">Clear All</button>
        </div>
    </div>
</div>

<script>
    const WEIGHT_DECAY = 0.25;
    const WEIGHT_BOOST = 1.10;
    
    let characters = [];
    let currentSelection = [];

    function init() {
        const saved = localStorage.getItem('dt_characters');
        if (saved) {
            characters = JSON.parse(saved);
        } else {
            // Default load
            const defaults = ["Barbarian", "Moon Elf", "Monk", "Paladin", "Ninja", "Seraph", "Pyromancer", "Shadow Thief", "Cursed Pirate", "Artificer", "Huntress", "Tactician", "Vampire Lord", "Gunslinger", "Samurai", "Spider-Ham", "Black Widow", "Black Panther", "Captain Marvel", "Thor", "Loki", "Scarlet Witch", "Dr. Strange", "Santa", "Krampus", "Treant"];
            characters = defaults.map(name => ({ name, weight: 100 }));
            saveToStorage();
        }
        renderList();
    }

    function pickCharacters(count) {
        if (characters.length < count) {
            alert(`Not enough characters! You need at least ${count}.`);
            return;
        }

        currentSelection = [];
        let tempPool = JSON.parse(JSON.stringify(characters));
        
        for (let i = 0; i < count; i++) {
            let totalWeight = tempPool.reduce((sum, c) => sum + c.weight, 0);
            let random = Math.random() * totalWeight;
            let currentSum = 0;
            
            for (let j = 0; j < tempPool.length; j++) {
                currentSum += tempPool[j].weight;
                if (random <= currentSum) {
                    currentSelection.push(tempPool[j].name);
                    tempPool.splice(j, 1); 
                    break;
                }
            }
        }
        displayResults();
    }

    function displayResults() {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = currentSelection.map((name, index) => `
            <div class="player-row">
                <span class="player-label">Player ${index + 1}</span>
                <span class="character-name">${name}</span>
            </div>
        `).join('');
        document.getElementById('confirmBtn').style.display = 'block';
    }

    function applyResults() {
        characters.forEach(char => {
            if (currentSelection.includes(char.name)) {
                char.weight *= WEIGHT_DECAY;
            } else {
                char.weight *= WEIGHT_BOOST;
            }
        });
        saveAndRefresh();
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color: #28a745; text-align:center; font-weight:bold;">Session Saved! Weights Adjusted.</p>`;
    }

    function addNewCharacter() {
        const input = document.getElementById('newName');
        const name = input.value.trim();
        if (!name) return;

        const weights = characters.map(c => c.weight).sort((a, b) => a - b);
        let startingWeight = 100;
        if (weights.length > 0) {
            const mid = Math.floor(weights.length / 2);
            startingWeight = weights.length % 2 !== 0 ? weights[mid] : (weights[mid - 1] + weights[mid]) / 2;
        }

        characters.push({ name, weight: startingWeight });
        input.value = '';
        saveAndRefresh();
    }

    function deleteCharacter(name) {
        if (confirm(`Remove ${name} from your collection?`)) {
            characters = characters.filter(c => c.name !== name);
            saveAndRefresh();
        }
    }

    function resetWeights() {
        if (confirm("Reset everyone to 100 weight?")) {
            characters.forEach(c => c.weight = 100);
            saveAndRefresh();
        }
    }

    function clearCharacterList() {
        if (confirm("Delete ALL characters? This cannot be undone.")) {
            characters = [];
            saveAndRefresh();
            document.getElementById('results').innerHTML = `<p style="text-align:center;">Collection empty.</p>`;
        }
    }

    function saveToStorage() {
        localStorage.setItem('dt_characters', JSON.stringify(characters));
    }

    function saveAndRefresh() {
        saveToStorage();
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('charList');
        const sorted = [...characters].sort((a, b) => a.name.localeCompare(b.name));
        
        if (characters.length === 0) {
            listDiv.innerHTML = `<p style="text-align:center; font-style:italic; padding: 20px;">No heroes added.</p>`;
            return;
        }

        listDiv.innerHTML = sorted.map(c => `
            <div class="char-item">
                <div class="char-info">
                    <span>${c.name}</span>
                    <span class="char-weight">Weight: ${Math.round(c.weight)}</span>
                </div>
                <button class="btn-del-single" onclick="deleteCharacter('${c.name.replace(/'/g, "\\'")}')">×</button>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
