<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne Cloud</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
            --edit: #f39c12;
            --disabled: #555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 500px; width: 100%; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 10px; }

        .results {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            min-height: 120px;
            margin-bottom: 20px;
            border: 2px solid var(--secondary);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
        }

        .char-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
            border: 1px solid var(--accent);
            background: var(--bg);
        }

        .player-info { display: flex; flex-direction: column; }
        .player-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; }
        .character-name { font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        .character-group { font-size: 0.7rem; color: #aaa; }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-confirm { background: #28a745; grid-column: span 3; margin-top: 10px; display: none; height: 50px; }

        .manage-section {
            background: #0f346055;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; }
        
        input {
            padding: 12px;
            border-radius: 5px;
            border: none;
            background: #1a1a2e;
            color: white;
        }

        #addBtn { background: var(--accent); margin-top: 5px; }

        .sort-bar {
            display: flex;
            gap: 5px;
            margin: 15px 0 10px 0;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
        }
        .btn-sort {
            flex: 1;
            font-size: 0.7rem;
            padding: 8px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-sort.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .char-list { max-height: 400px; overflow-y: auto; border-top: 1px solid #ffffff11; }
        .char-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ffffff11;
        }
        .char-item.disabled { opacity: 0.4; background: rgba(0,0,0,0.1); }

        .list-meta { display: flex; align-items: center; gap: 10px; }
        .list-thumb { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; }
        .list-details { display: flex; flex-direction: column; }
        .list-weight { font-size: 0.7rem; color: #28a745; font-weight: bold; }
        .list-weight.zero { color: var(--danger); }
        .list-group { font-size: 0.6rem; opacity: 0.5; }

        .action-btns { display: flex; gap: 5px; }
        .btn-edit { color: var(--edit); background: transparent; font-size: 1.1rem; padding: 5px; }
        .btn-del { color: var(--danger); background: transparent; font-size: 1.1rem; padding: 5px; }

        .danger-zone { margin-top: 25px; display: flex; gap: 10px; }
        .btn-danger { background: var(--danger); font-size: 0.7rem; flex: 1; }
        .btn-neutral { background: #444; font-size: 0.7rem; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Throne Cloud</h1>
    
    <div id="results" class="results">
        <p style="text-align: center; opacity: 0.6;">Syncing with Cloud...</p>
    </div>

    <div class="controls">
        <button onclick="pickCharacters(2)">2P</button>
        <button onclick="pickCharacters(3)">3P</button>
        <button onclick="pickCharacters(4)">4P</button>
        <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">Lock in Selection</button>
    </div>

    <div class="manage-section">
        <h3 id="formTitle">Add Character</h3>
        <div class="input-group">
            <input type="text" id="newName" placeholder="Hero Name">
            <div class="input-row">
                <input type="text" id="newGroup" placeholder="Season / Group">
                <input type="number" id="newWeight" placeholder="Weight" min="0">
            </div>
            <input type="text" id="newUrl" placeholder="Image URL">
            <button id="addBtn" onclick="handleFormSubmit()">Add Hero</button>
            <button id="cancelEdit" onclick="resetForm()" style="display:none; background:#444;">Cancel Edit</button>
        </div>

        <div class="sort-bar">
            <button id="sort-group" class="btn-sort active" onclick="setSort('group')">By Group</button>
            <button id="sort-name" class="btn-sort" onclick="setSort('name')">By Name</button>
            <button id="sort-weight" class="btn-sort" onclick="setSort('weight')">By Weight</button>
        </div>
        
        <div class="char-list" id="charList"></div>

        <div class="danger-zone">
            <button class="btn-neutral" onclick="resetWeights()">Reset Odds</button>
            <button class="btn-danger" onclick="clearCharacterList()">Clear All</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    // --- 1. CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyDxBCHqFOr3K-Vh4-KeTAUt2UM03DJ60nE",
      authDomain: "dicethrone-ba1f1.firebaseapp.com",
      databaseURL: "https://dicethrone-ba1f1-default-rtdb.firebaseio.com",
      projectId: "dicethrone-ba1f1",
      storageBucket: "dicethrone-ba1f1.firebasestorage.app",
      messagingSenderId: "580487401452",
      appId: "1:580487401452:web:94d49e4bff6f3815b63ac9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const WEIGHT_DECAY = 0.25;
    const WEIGHT_BOOST = 1.10;
    const DEFAULT_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e94560'%3E%3Cpath d='M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z'/%3E%3C/svg%3E";
    
    let characters = [];
    let currentSelection = [];
    let editIndex = -1;
    let currentSort = 'group';

    function init() {
        db.ref('characters').on('value', (snapshot) => {
            const data = snapshot.val();
            characters = data || [];
            renderList();
            if (currentSelection.length === 0) {
                document.getElementById('results').innerHTML = `<p style="text-align: center; opacity: 0.6;">Ready. Select players.</p>`;
            }
        });
    }

    function saveToCloud() {
        db.ref('characters').set(characters);
    }

    // --- 2. UPDATED PICK LOGIC (Skips Weight 0) ---
    function pickCharacters(count) {
        // Filter out characters with 0 weight
        const activePool = characters.filter(c => c.weight > 0);

        if (activePool.length < count) { 
            alert(`Not enough active heroes! You only have ${activePool.length} with weight > 0.`); 
            return; 
        }

        currentSelection = [];
        let tempPool = JSON.parse(JSON.stringify(activePool));
        
        for (let i = 0; i < count; i++) {
            let totalWeight = tempPool.reduce((sum, c) => sum + c.weight, 0);
            let random = Math.random() * totalWeight;
            let currentSum = 0;
            for (let j = 0; j < tempPool.length; j++) {
                currentSum += tempPool[j].weight;
                if (random <= currentSum) {
                    currentSelection.push(tempPool[j]);
                    tempPool.splice(j, 1); 
                    break;
                }
            }
        }
        displayResults();
    }

    function displayResults() {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = currentSelection.map((char, index) => `
            <div class="player-row">
                <img src="${char.url || DEFAULT_IMG}" class="char-thumb" onerror="this.src='${DEFAULT_IMG}'">
                <div class="player-info">
                    <span class="player-label">Player ${index + 1}</span>
                    <span class="character-name">${char.name}</span>
                    <span class="character-group">${char.group || 'General'}</span>
                </div>
            </div>
        `).join('');
        document.getElementById('confirmBtn').style.display = 'block';
    }

    function applyResults() {
        const selectedNames = currentSelection.map(s => s.name);
        characters.forEach(char => {
            if (char.weight > 0) { // Only adjust if they aren't disabled
                char.weight = selectedNames.includes(char.name) ? char.weight * WEIGHT_DECAY : char.weight * WEIGHT_BOOST;
            }
        });
        saveToCloud();
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color: #28a745; text-align:center;">Weights Adjusted!</p>`;
    }

    // --- 3. MANAGEMENT LOGIC ---
    function handleFormSubmit() {
        const name = document.getElementById('newName').value.trim();
        const group = document.getElementById('newGroup').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        const weightInput = document.getElementById('newWeight').value;
        
        if (!name) return;

        let manualWeight = parseFloat(weightInput);

        if (editIndex > -1) {
            characters[editIndex].name = name;
            characters[editIndex].group = group;
            characters[editIndex].url = url;
            // Use manual weight if provided, else keep current
            characters[editIndex].weight = isNaN(manualWeight) ? characters[editIndex].weight : manualWeight;
        } else {
            // New hero logic
            let startingWeight = isNaN(manualWeight) ? 100 : manualWeight;
            if (isNaN(manualWeight) && characters.length > 0) {
                const weights = characters.map(c => c.weight).filter(w => w > 0).sort((a, b) => a - b);
                const mid = Math.floor(weights.length / 2);
                startingWeight = weights[mid] || 100;
            }
            characters.push({ name, group, url, weight: startingWeight });
        }
        resetForm();
        saveToCloud();
    }

    function startEdit(name) {
        editIndex = characters.findIndex(c => c.name === name);
        const char = characters[editIndex];
        document.getElementById('newName').value = char.name;
        document.getElementById('newGroup').value = char.group || '';
        document.getElementById('newUrl').value = char.url || '';
        document.getElementById('newWeight').value = Math.round(char.weight);
        
        document.getElementById('formTitle').innerText = "Edit Character";
        document.getElementById('addBtn').innerText = "Update Hero";
        document.getElementById('cancelEdit').style.display = "block";
        window.scrollTo(0, document.body.scrollHeight);
    }

    function resetForm() {
        editIndex = -1;
        document.getElementById('newName').value = '';
        document.getElementById('newGroup').value = '';
        document.getElementById('newUrl').value = '';
        document.getElementById('newWeight').value = '';
        document.getElementById('formTitle').innerText = "Add Character";
        document.getElementById('addBtn').innerText = "Add Hero";
        document.getElementById('cancelEdit').style.display = "none";
    }

    function deleteChar(name) {
        if (confirm(`Remove ${name}?`)) {
            characters = characters.filter(c => c.name !== name);
            saveToCloud();
        }
    }

    function resetWeights() {
        if (confirm("Reset all active weights to 100? (0 weight stays 0)")) {
            characters.forEach(c => { if(c.weight > 0) c.weight = 100; });
            saveToCloud();
        }
    }

    function clearCharacterList() {
        if (confirm("Delete ALL?")) { characters = []; saveToCloud(); }
    }

    function setSort(type) {
        currentSort = type;
        document.querySelectorAll('.btn-sort').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`sort-${type}`).classList.add('active');
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('charList');
        const sorted = [...characters].sort((a, b) => {
            if (currentSort === 'weight') return b.weight - a.weight;
            if (currentSort === 'name') return a.name.localeCompare(b.name);
            const grpA = (a.group || '').toLowerCase();
            const grpB = (b.group || '').toLowerCase();
            if (grpA < grpB) return -1;
            if (grpA > grpB) return 1;
            return a.name.localeCompare(b.name);
        });
        
        listDiv.innerHTML = sorted.map(c => `
            <div class="char-item ${c.weight === 0 ? 'disabled' : ''}">
                <div class="list-meta">
                    <img src="${c.url || DEFAULT_IMG}" class="list-thumb" onerror="this.src='${DEFAULT_IMG}'">
                    <div class="list-details">
                        <span>${c.name}</span>
                        <span class="list-group">${c.group || 'General'}</span>
                        <span class="list-weight ${c.weight === 0 ? 'zero' : ''}">
                            ${c.weight === 0 ? 'DISABLED (0)' : 'Weight: ' + Math.round(c.weight)}
                        </span>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn-edit" onclick="startEdit('${c.name.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn-del" onclick="deleteChar('${c.name.replace(/'/g, "\\'")}')">×</button>
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
