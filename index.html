<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne</title>

    <!-- Stylesheets: We will dynamically load either the production or development stylesheet based on the hostname -->
    <script>
        // Check if this is Production or Local environment based on hostname
        const isProd = window.location.hostname === "dicethrone-picker.pages.dev" || window.location.hostname === "sygec.github.io"; 
        
        // Create a new link element
        const themeLink = document.createElement('link');
        themeLink.rel = 'stylesheet';
        // Assign the file path based on if this is prod or dev
        themeLink.href = isProd ? 'style-prod.css' : 'style-dev.css';
        // Append it to the head
        document.head.appendChild(themeLink);
    </script>
    <!-- Additionnally, link the common stylesheet -->
    <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
    <div class="container">
        <h1>Dice Throne</h1>
        <div align="center">v<span id="version-number" style="cursor: pointer; text-decoration: underline;">...</span></div>

        <!-- Modal section for the change log, initially hidden and only shown when the version number is clicked. The content of the modal will be dynamically generated based on the changelog.json file. -->
        <div id="changelog-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Change Log</h2>
            <hr>
            <div id="changelog-container"></div>
        </div>
        </div>   
        
        <!-- Section for toggling which players are active in the randomizer, with checkboxes for each player. By default, the first 4 players are checked and the invitee slots are unchecked -->
        <!-- The player names and colors are defined in the NAMES and PLAYER_COLORS constants in the script. -->
        <div class="player-toggle-zone">
            <label class="p-chk"><span class="player-tag" style="background:var(--p1)">Claudine</span> <input type="checkbox" id="use0" checked></label>
            <label class="p-chk"><span class="player-tag" style="background:var(--p2)">Joel</span> <input type="checkbox" id="use1" checked></label>
            <label class="p-chk"><span class="player-tag" style="background:var(--p3)">Julie</span> <input type="checkbox" id="use2" checked></label>
            <label class="p-chk"><span class="player-tag" style="background:var(--p4)">Martin</span> <input type="checkbox" id="use3" checked></label>
            <label class="p-chk"><span class="player-tag" style="background:var(--p5)">Invitee 1</span> <input type="checkbox" id="use4"></label>
            <label class="p-chk"><span class="player-tag" style="background:var(--p5)">Invitee 2</span> <input type="checkbox" id="use5"></label>
        </div>

        <!-- Div where the results of the randomizer roll will be rendered, initially showing a prompt to select players and roll. -->
        <!-- After rolling, this section will display the assigned characters for each active player, along with dropdowns to manually change the selection if desired, 
             and stats about past plays for the main 4 players. -->
        <div id="results" class="results"><p style="text-align: center; opacity: 0.6;">Select players and roll.</p></div>

        <!-- Error message that is shown if there are duplicate characters selected for the active players, this is hidden by default and only shown 
             if the validation function detects duplicates in the selections, either from the initial roll or from manual changes with the dropdowns.
             The confirm button is also disabled in this case to prevent locking in a session with duplicate characters. -->
        <div id="error-msg">⚠ Duplicate hero selected! Each player must have a unique character.</div>

        <!-- Button to roll the randomizer, which calls the pickCharacters function to perform the random selection and render the results. -->
        <button id="rollBtn" onclick="pickCharacters()">ROLL RANDOMIZER</button>
        <!-- Button to confirm the selections and apply the results, which calls the applyResults function to update the weights and stats in the database based on the selected characters for each player -->
        <!-- This button is hidden by default and only shown after a roll to encourage users to roll before confirming, and to prevent confusion about when the button should be used. -->
        <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">LOCK IN SESSION</button>

        <!-- Button to toggle the visibility of the hero database and stats section -->
        <button class="db-toggle-btn" onclick="toggleDatabase()">📂 Show Hero Database & Stats</button>

        <!-- Sorting controls for the hero database section, allowing sorting by name, weight in percentage and last played date for each player. -->
        <div id="dbSection">
            <div class="sort-controls">
                <div class="sort-row">
                    <div class="player-card-mini">
                        <span class="mini-name"> </span>
                        <div class="mini-actions">
                            <button class="btn-mini-sort" id="sort-name" onclick="setSort('name')">Name</button>
                        </div>
                    </div>
                    <div class="player-card-mini" style="border-left-color: var(--p1);">
                        <span class="mini-name">Claudine</span>
                        <div class="mini-actions">
                            <button class="btn-mini-sort" id="sort-w0" onclick="setSort('w0')">%</button>
                            <button class="btn-mini-sort" id="sort-d0" onclick="setSort('d0')">&#128197;</button>
                        </div>
                    </div>
                    <div class="player-card-mini" style="border-left-color: var(--p2);">
                        <span class="mini-name">Joel</span>
                        <div class="mini-actions">
                            <button class="btn-mini-sort" id="sort-w1" onclick="setSort('w1')">%</button>
                            <button class="btn-mini-sort" id="sort-d1" onclick="setSort('d1')">&#128197;</button>
                        </div>
                    </div>
                    <div class="player-card-mini" style="border-left-color: var(--p3);">
                        <span class="mini-name">Julie</span>
                        <div class="mini-actions">
                            <button class="btn-mini-sort" id="sort-w2" onclick="setSort('w2')">%</button>
                            <button class="btn-mini-sort" id="sort-d2" onclick="setSort('d2')">&#128197;</button>
                        </div>
                    </div>
                    <div class="player-card-mini" style="border-left-color: var(--p4);">
                        <span class="mini-name">Martin</span>
                        <div class="mini-actions">
                            <button class="btn-mini-sort" id="sort-w3" onclick="setSort('w3')">%</button>
                            <button class="btn-mini-sort" id="sort-d3" onclick="setSort('d3')">&#128197;</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dice filter section to filter the hero list by complexity level, with buttons for each level and an "ALL" button to toggle all levels on/off -->
            <div class="dice-filter-section" style="margin-bottom: 20px;">
                <div class="dice-bar">
                    <img src="images/d1.png" class="dice-icon" id="dice-1" onclick="toggleLevel(1)" title="Level 1">
                    <img src="images/d2.png" class="dice-icon" id="dice-2" onclick="toggleLevel(2)" title="Level 2">
                    <img src="images/d3.png" class="dice-icon" id="dice-3" onclick="toggleLevel(3)" title="Level 3">
                    <img src="images/d4.png" class="dice-icon" id="dice-4" onclick="toggleLevel(4)" title="Level 4">
                    <img src="images/d5.png" class="dice-icon" id="dice-5" onclick="toggleLevel(5)" title="Level 5">
                    <img src="images/d6.png" class="dice-icon" id="dice-6" onclick="toggleLevel(6)" title="Level 6">
                    <img src="images/d_all.png" class="dice-icon" id="dice-all" onclick="toggleLevel('all')" title="All Levels">
                </div>
            </div>

            <!---  Search bar to filter the hero list by name or group, with an input field that calls the renderList function on input to update the displayed list based on the search term. 
                   The count-stats div below it shows how many heroes are currently displayed out of the total number of heroes in the database, this is also updated by the renderList
                   function whenever the list is re-rendered. -->
            <div class="search-container" style="margin-bottom: 30px; margin-top: 15px; text-align: center">
                <input type="text" id="hero-search" placeholder="Search Heroes or Groups..." 
                    oninput="renderList()" 
                    style="display: inline-block; width: 65%; padding: 10px; padding-right: 25px ; border-radius: 8px; border: 1px solid var(--secondary); background: lightgray; color: black; box-sizing: border-box;">
                <div id="count-stats" style="font-size: 0.8rem; opacity: 0.6; margin-top: 10px;">
                    Showing 0 of 0 heroes
                </div>
            </div>
            <!-- Hero container for displaying the filtered list -->
            <div id="heroContainer"></div>
        </div>

        <!-- Admin section for adding new heroes to the database and resetting weights and stats, this section is hidden by default and can be toggled with the "Show Admin Section" button. 
             The form allows entering the hero name, group, slug for the image and complexity level, and has a save button that calls the saveCharacter function to add the new hero to the database. 
             If editing an existing hero, the form will populate with that hero's data and allow saving changes or canceling the edit. 
             Below the form are buttons to reset all probabilities to 100 or reset all play counts and dates, which call their respective functions to update the database accordingly. -->
        <button class="admin-toggle-btn" onclick="toggleAdmin()">Show Admin Section</button>
        <div id="adminSection">
            <div class="manage-form">
                <h3 id="formTitle" style="margin-top:0; font-size: 1rem; color: var(--accent);">Add New Hero</h3>
                <div class="form-grid">
                    <input type="text" id="charName" placeholder="Hero Name">
                    <input type="text" id="charGroup" placeholder="Group (e.g. Season 1)">
                    <input type="text" id="charSlug" placeholder="Slug (for image)">
                    <input type="text" id="charComplexity" placeholder="Complexity level">
                </div>
                <button class="btn-save" id="saveBtn" onclick="saveCharacter()">Save Hero</button>
                <button class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
            </div>        
            <div style="margin-top:20px; border-top: 1px solid #ffffff22; padding-top:15px;">
                <button class="btn-danger" onclick="resetAllWeights()">RESET PROBABILITIES TO 100</button>
                <button class="btn-danger" onclick="resetAllStats()">RESET PLAY COUNTS & DATES</button>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    
    // Global variable to store the log once it's fetched
    let cachedChangelog = null;

    const versionLabel = document.getElementById("version-number");
    const container = document.getElementById("changelog-container");
    const modal = document.getElementById("changelog-modal");
    const closeBtn = document.querySelector(".close-button");

    // 1. Fetch data as soon as the page loads
    async function initializeApp() {
    try {
        const response = await fetch('changelog.json');
        cachedChangelog = await response.json();

        // Set the label to the latest version in the JSON
        if (cachedChangelog.length > 0) {
        versionLabel.innerText = cachedChangelog[0].version;
        }
    } catch (error) {
        console.error("Could not load version number:", error);
        versionLabel.innerText = "Error";
    }
    }

    // 2. Function to build the list and show the modal
    function openChangelog() {
    if (!cachedChangelog) return; // Wait if data isn't loaded yet

    container.innerHTML = ''; // Clear old content
    cachedChangelog.forEach(entry => {
        const section = document.createElement('div');
        section.innerHTML = `
        <h3>v${entry.version}</h3>
        <ul>
            ${entry.changes.map(change => `<li>${change}</li>`).join('')}
        </ul>
        `;
        container.appendChild(section);
    });

    modal.style.display = "block";
    document.body.style.overflow = "hidden"; // Stops background scrolling
    }

    function closeChangelog() {
    modal.style.display = "none";
    document.body.style.overflow = "auto"; // Restores background scrolling
    }

    // 3. Event Listeners
    window.addEventListener('DOMContentLoaded', initializeApp);
    versionLabel.onclick = openChangelog;
    closeBtn.onclick = closeChangelog;

    // Close if user clicks the dark background
    window.onclick = (event) => {
    if (event.target == modal) closeChangelog();
    }

    const prodFirebaseConfig = {apiKey: "AIzaSyDxBCHqFOr3K-Vh4-KeTAUt2UM03DJ60nE", authDomain: "dicethrone-ba1f1.firebaseapp.com", databaseURL: "https://dicethrone-ba1f1-default-rtdb.firebaseio.com", projectId: "dicethrone-ba1f1", storageBucket: "dicethrone-ba1f1.firebasestorage.app", messagingSenderId: "580487401452", appId: "1:580487401452:web:94d49e4bff6f3815b63ac9"};
    const devFirebaseConfig = {apiKey: "AIzaSyDIrNnHU5TkKuXCsZJpuLHxzbhfhIV9KXk", authDomain: "dicethrone-dev.firebaseapp.com", projectId: "dicethrone-dev", storageBucket: "dicethrone-dev.firebasestorage.app", messagingSenderId: "139571744700", appId: "1:139571744700:web:5d9755e7a7fa2a5711e5b9"};
    
    // Choose the config based on where the app is running
    const selectedConfig = isProd ? prodFirebaseConfig : devFirebaseConfig;

    // Initialize Firebase with the selected config
    firebase.initializeApp(selectedConfig);

    // Keep your existing database reference
    const db = firebase.database();

    const NAMES = ["Claudine", "Joel", "Julie", "Martin", "Invitee 1", "Invitee 2"];
    const PLAYER_COLORS = ['var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)'];
    let characters = [];
    let currentSort = 'name';
    let sortAsc = true;
    let editIndex = -1;

    const getImgUrl = (slug) => slug ? `https://dice-throne.rulepop.com/heroes/${slug}.webp` : "";
    const getHeroLink = (slug) => `https://dice-throne.rulepop.com/#hero/${slug}`;

    function init() {
        db.ref('characters_v4').on('value', snap => {
            const initialSort = currentSort;
            currentSort = null;
            setSort(initialSort);
            characters = snap.val() || [];
            renderList();
        });
    }

    function toggleDatabase() {
        const s = document.getElementById('dbSection');
        const b = document.querySelector('.db-toggle-btn');
        const isHidden = s.style.display !== "block";
        s.style.display = isHidden ? "block" : "none";
        b.innerText = isHidden ? "📁 Hide Hero Database" : "📂 Show Hero Database & Stats";
    }

    function toggleAdmin() {
        const s = document.getElementById('adminSection');
        const b = document.querySelector('.admin-toggle-btn');
        const isHidden = s.style.display !== "block";
        s.style.display = isHidden ? "block" : "none";
        b.innerText = isHidden ? 'Hide Admin Section' : 'Show Admin Section';
    }    

    /* --- MANAGEMENT LOGIC --- */
    function saveCharacter() {
        const name = document.getElementById('charName').value.trim();
        const group = document.getElementById('charGroup').value.trim();
        const slug = document.getElementById('charSlug').value.trim();
        const complexity = document.getElementById('charComplexity').value.trim();
        
        if(!name) return alert("Name is required");

        if (editIndex > -1) {
            characters[editIndex] = { ...characters[editIndex], name, group, slug };
        } else {
            characters.push({
                name, group, slug, complexity,
                weights: [300, 300, 300, 300],
                playCount: [0, 0, 0, 0],
                lastPlayed: ["", "", "", ""]
            });
        }
        db.ref('characters_v4').set(characters);
        resetForm();
    }

    function editChar(idx) {
        editIndex = idx;
        const c = characters[idx];
        document.getElementById('charName').value = c.name;
        document.getElementById('charGroup').value = c.group || "";
        document.getElementById('charSlug').value = c.slug || "";
        document.getElementById('formTitle').innerText = "Edit Hero: " + c.name;
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('dbSection').scrollIntoView();
    }

    function resetForm() {
        editIndex = -1;
        document.getElementById('charName').value = "";
        document.getElementById('charGroup').value = "";
        document.getElementById('charSlug').value = "";
        document.getElementById('charComplexity').value = "";
        document.getElementById('formTitle').innerText = "Add New Hero";
        document.getElementById('cancelBtn').style.display = "none";
    }

    /* --- ROLLING LOGIC --- */
    function pickCharacters() {
        // reset active array
        let active = [];
        NAMES.forEach((_, i) => {                                   // for every person in the NAMES const array, i = 0 to 5
            if(document.getElementById(`use${i}`).checked)          // if the checkbox for this person is checked, i.e. player is active
                active.push(i);                                     // add the index of this person to the "active" array, i.e. active will be an array of the indexes of the players that are active, e.g. [0,2,4] if Claudine, Julie and Invitee 1 are selected
            });
        if(active.length === 0) return alert("Select players!");    // if no players are selected, alert and exit function
        
        active = active.sort(() => Math.random() - 0.5);            // randomize order of active players so rolls are in random order each time
        const resultsDiv = document.getElementById('results');      // get the div where results are rendered
        resultsDiv.innerHTML = '';                                  // clear previous results so we can render new ones
        let pool = JSON.parse(JSON.stringify(characters));          // create a copy of the characters array to manipulate for this roll, we will remove characters from this pool as they are selected to avoid duplicates in the random selection process, but we want to keep the original "characters" array intact for reference and for the list rendering

        active.forEach(pIdx => {                                    // for each active player index, e.g. 0 for Claudine, 2 for Julie, etc
            let selectedName = "";                                  // initialize variable to hold the name of the character that will be selected for this player
            if ((pIdx === 4) || (pIdx === 5)) {                     // if this is an invitee slot, select purely random from the pool without weighting, to give them a "wild card" feel and avoid accidentally punishing them with high weights on characters that the main 4 players have played a lot
                const r = Math.floor(Math.random() * pool.length);  // select a random index from the pool
                selectedName = pool[r]?.name;                       // get the name of the character at that index
                pool.splice(r, 1);                                  // remove that character from the pool to avoid duplicates, this modifies the pool array in place
            } else {                                                // for the main 4 players, we want to weight the random selection based on the weights in the characters array, which are influenced by past play history to encourage variety and reduce repeats. The weighting formula is: weight / (playCount + 1) so that characters that have been played more often will have their effective weight reduced, but they won't be completely removed from the pool unless their weight is 0
                const activePool = pool.filter(c => c.weights[pIdx] > 0); // create a temporary pool of only characters that have a weight greater than 0 for this player, this is the pool that the random selection will be made from, if a character has a weight of 0 for this player it means they have been played so much that we want to temporarily remove them from the random selection to give other characters a better chance to be selected
                let totalScaled = activePool.reduce((sum, c) => sum + (c.weights[pIdx] / (((c.playCount?.[pIdx]) || 0) + 1)), 0); // calculate the total of the scaled weights for the active pool, this is used to determine the range of the random number for selection, we sum up the scaled weights which are calculated as weight / (playCount + 1) to give a fair chance to characters that have been played less often
                let rand = Math.random() * totalScaled;             // generate a random number between 0 and the total of the scaled weights, this will be used to select a character from the active pool based on their weighted probability
                let runningSum = 0;                                 // initialize a running sum variable to keep track of the cumulative probability as we iterate through the active pool, we will add the scaled weight of each character to this running sum until it exceeds the random number, at which point we know that the current character is the one that has been selected based on the weighted probabilities 
                for(let c of activePool) {                          // iterate through each character in the active pool
                    runningSum += (c.weights[pIdx] / (((c.playCount?.[pIdx]) || 0) + 1)); // add the scaled weight of this character to the running sum
                    if(rand <= runningSum) {                        // if the random number is less than or equal to the running sum, it means we have found our selected character based on the weighted probabilities
                        selectedName = c.name;                      // set the selected name to this character's name   
                        pool.splice(pool.findIndex(p => p.name === selectedName), 1); // remove this character from the pool to avoid duplicates in the selection for the next players, we find the index of this character in the original pool and remove it using splice, this modifies the pool array in place
                        break;                                      // break out of the loop since we have found our selected character for this player
                    }
                }
            }
            renderPlayerRow(pIdx, selectedName);                    // call the function to render the selected character for this player in the results div, passing the player index and the name of the selected character
        });
        validateSelection();                                        // after all players have been assigned a character and rendered, call the validation function to check for any duplicates in the selections (in case of manual changes with the dropdowns) and enable/disable the confirm button accordingly
        document.getElementById('confirmBtn').style.display = 'block';  // show the confirm button so the user can lock in their session after rolling, this button is hidden by default and only shown after a roll to encourage users to roll before confirming, and to prevent confusion about when the button should be used
    }

    function renderPlayerRow(pIdx, selectedName) {
        const charData = characters.find(c => c.name === selectedName);
        const resultsDiv = document.getElementById('results');
        const plays = (charData?.playCount && charData.playCount[pIdx]) || 0;
        const last = (charData?.lastPlayed && charData.lastPlayed[pIdx]) || "Never";
        const complexity = charData?.complexity ? ` (Complexity: ${charData.complexity})` : "";

        resultsDiv.innerHTML += `
            <div class="player-row">
                <a href="${getHeroLink(charData?.slug)}" target="_blank" id="link-${pIdx}">
                    <div class="char-complexity-roll">
                        <img src="${getImgUrl(charData?.slug)}" class="char-img-roll" id="img-${pIdx}">
                        <img src="images/d${charData?.complexity}.png" class="complexity-roll" alt="Complexity">
                    </div>
                </a>
                <div style="flex:1">
                    <div style="margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                        <span class="player-tag" style="background:var(--p${pIdx+1})">${NAMES[pIdx]}</span>
                        ${pIdx < 4 ? `<div class="roll-stats"><span>Plays: <b>${plays}</b></span><span>Last: <b>${last}</b></span></div>` : ''}
                    </div>
                    <select class="char-select" data-player="${pIdx}" onchange="handleDropdownChange(this)">
                        ${[...characters]
                            .sort((a, b) => a.name.localeCompare(b.name))
//                            .map(c => `<option value="${c.name}" ${c.name === selectedName ? 'selected' : ''}>${c.name}&ensp;&ensp;&ensp;&ensp;&ensp;(Plays: ${c.playCount?.[pIdx] || '0'}&ensp;Last: ${c.lastPlayed?.[pIdx] || 'Never'})</option>`)
                            .map(c => `<option value="${c.name}" ${c.name === selectedName ? 'selected' : ''}>${c.name}</option>`)
                            .join('')}
                    </select>
                </div>
            </div>`;
    }

    function handleDropdownChange(el) {
        const pIdx = parseInt(el.dataset.player);
        const char = characters.find(c => c.name === el.value);
        document.getElementById(`img-${pIdx}`).src = getImgUrl(char.slug);
        document.getElementById(`link-${pIdx}`).href = getHeroLink(char.slug);
        
        const statsDiv = el.closest('.player-row').querySelector('.roll-stats');
        if (statsDiv && pIdx < 4) {
            statsDiv.innerHTML = `<span>Plays: <b>${(char.playCount?.[pIdx] || 0)}</b></span><span>Last: <b>${(char.lastPlayed?.[pIdx] || 'Never')}</b></span>`;
        }
        validateSelection(); // Check for duplicates after manual change
    }

    /* --- VALIDATION LOGIC --- */
    function validateSelection() {
        const dropdowns = document.querySelectorAll('.char-select');
        const names = Array.from(dropdowns).map(d => d.value);
        const hasDupes = names.some((name, idx) => names.indexOf(name) !== idx);
        
        const confirmBtn = document.getElementById('confirmBtn');
        const errorMsg = document.getElementById('error-msg');
        
        confirmBtn.classList.toggle('disabled', hasDupes);
        confirmBtn.disabled = hasDupes;
        errorMsg.style.display = hasDupes ? 'block' : 'none';
        
        dropdowns.forEach(d => {
            const isDupe = names.filter(n => n === d.value).length > 1;
            d.classList.toggle('error', isDupe);
        });
    }

    function applyResults() {
        const dropdowns = document.querySelectorAll('.char-select');
        const today = new Date().toLocaleDateString('en-CA');
        const picks = Array.from(dropdowns).map(sel => ({ pIdx: parseInt(sel.dataset.player), charName: sel.value }));

        characters.forEach(char => {
            [0,1,2,3].forEach(pIdx => {
                const pick = picks.find(s => s.pIdx === pIdx);
                const wasPicked = pick && pick.charName === char.name;
                if (picks.some(s => s.pIdx === pIdx)) {
                    char.weights[pIdx] = wasPicked ? 20 : char.weights[pIdx] + 10;
                }
                if (wasPicked) {
                    if (!char.playCount) char.playCount = [0,0,0,0];
                    if (!char.lastPlayed) char.lastPlayed = ["","","",""];
                    char.playCount[pIdx] = (char.playCount[pIdx] || 0) + 1;
                    char.lastPlayed[pIdx] = today;
                }
            });
        });
        db.ref('characters_v4').set(characters);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color:#28a745; text-align:center; font-weight:bold;">Legacy Stats Updated!</p>`;
    }

    /* DICE BAR LIST LOGIC */
    // Initialize with all levels (1-6) active by default
    let activeLevels = new Set([1, 2, 3, 4, 5, 6]);

    function initDiceFilter() {
        // Apply the 'active-die' class to all dice on load
        activeLevels.forEach(level => {
            const die = document.getElementById(`dice-${level}`);
            if (die) die.classList.add('active-die');
        });
    }

    // ****************************************** 
    // toggleLevel(level)
    // input: level -> dice number
    // ****************************************** 
    // This function will manage the Set used to determine which dice are active and which are not
    // ****************************************** 
    function toggleLevel(level) {
        if (level === 'all') {
            //if clicking the ALL dice
            if (activeLevels.size === 6) {
                //if all dice are active
                activeLevels = new Set([]);  //reset Set to empty, i.e. set all dice to disabled
            } else {
                // otherwise, reset the Set to include all 6 levels, i.e. all deice active
                activeLevels = new Set([1, 2, 3, 4, 5, 6]);
            }
        } else {
            // clicking a number dice
            if (activeLevels.has(level)) {
                // if set includes this dice, i.e. dice is active then remove from Set
                activeLevels.delete(level);
            } else {
                // otherwise add dice to set to activate it
                activeLevels.add(level);
            }
        }
        // refresh the visuals for all dice based on the current Set
        updateDiceVisuals();
        // trigger your render function to update the list
        if (typeof renderList === "function") renderList();
    }

    // ****************************************** 
    // updateDiceVisuals()
    // input: none
    // ****************************************** 
    // This function will manage the visuals of the dice bar, setting to active if part of Set 
    // ****************************************** 
    function updateDiceVisuals() {
        // update state of 6 "number" dice
        for (let i = 1; i <= 6; i++) {
            const die = document.getElementById(`dice-${i}`);
            if (die) {
                if (activeLevels.has(i)) {
                    die.classList.add('active-die');
                } else {
                    die.classList.remove('active-die');
                }
            }
        }
        // update state of the "ALL" dice
        const allDie = document.getElementById('dice-all');
        if (allDie) {
            // cctive only if the Set contains all 6 levels
            if (activeLevels.size === 6) {
                allDie.classList.add('active-die');
            } else {
                allDie.classList.remove('active-die');
            }
        }
    }

    // Ensure visuals are correct when the page loads
    window.addEventListener('DOMContentLoaded', updateDiceVisuals);

    /* --- LIST & HELPERS --- */
    function resetAllWeights() { if(confirm("Reset all probabilities to 100?")) { characters.forEach(c => c.weights = [100, 100, 100, 100]); db.ref('characters_v4').set(characters); } }

    function resetAllStats() { if(confirm("Reset all play history?")) { characters.forEach(c => { c.playCount = [0,0,0,0]; c.lastPlayed = ["","","",""]; }); db.ref('characters_v4').set(characters); } }

    function setSort(key) {
        if (currentSort === key) {
            sortAsc = !sortAsc;
        } else {
            currentSort = key;
            sortAsc = !key.startsWith('d') && !key.startsWith('w');
        }

        // 1. Clear all active states and arrows
        document.querySelectorAll('.btn-mini-sort').forEach(btn => {
            btn.classList.remove('active');
            // Reset text to original (removing any existing arrows)
            if (btn.id === 'sort-name') btn.innerText = 'Name';
    //        if (btn.id === 'sort-group') btn.innerText = '\u{1F465}';
            if (btn.id.includes('w')) btn.innerText = '%';
            if (btn.id.includes('d')) btn.innerText = '\u{1F4C5}';
        });

        // 2. Highlight the clicked button
        const activeBtn = document.getElementById(`sort-${key}`);
        if (activeBtn) {
            activeBtn.classList.add('active');
            // 3. Add the directional arrow
            const arrow = sortAsc ? ' ▲' : ' ▼';
            activeBtn.innerText += arrow;
        }
        renderList();
    }

    // ****************************************** 
    // renderList()
    // input: none
    // ****************************************** 
    // Renders the list of heroes in the database section based on the current search term, 
    // the active dice filters, and the current sort settings. This function is called whenever 
    // any of those parameters change to update the displayed list accordingly.
    // ****************************************** 
    function renderList() {
        const container = document.getElementById('heroContainer');  // get the container element where the hero list will be rendered
        const searchTerm = document.getElementById('hero-search')?.value.toLowerCase() || "";  // get the value of the search input and convert to lowercase for case-insensitive matching, if the element doesn't exist default to an empty string
        // Calculate totals for each player index across all characters for percentage calculations
        const totals = [0, 1, 2, 3].map(i => characters.reduce((sum, c) => sum + c.weights[i], 0));  // create an array of totals for each player index by reducing the full characters array, summing up the weights for each player index across all characters, this is used to calculate the percentages for the stats display in the list, and ensures that the percentages are always relative to the entire pool of characters, even after filtering, so that players can see how their stats compare to the overall distribution in the database
        // Filter the characters based on the search term and active complexity filters
        const filtered = characters.filter(c => {   // filter the characters array to only include characters that match the search term in either their name or group, and also match the active complexity filters
            const nameMatch = c.name.toLowerCase().includes(searchTerm);            // Check if the character's name includes the search term (case-insensitive)
            const groupMatch = (c.group || "").toLowerCase().includes(searchTerm);  // Check if the character's group includes the search term (case-insensitive), if group is undefined use empty string to avoid errors
            const complexityMatch = activeLevels.has(Number(c.complexity));         // Check if the character's complexity level is in the activeLevels Set, converting to Number to ensure correct type comparison
            return (nameMatch || groupMatch) && complexityMatch;                    // Return true if either the name or group matches the search term AND the complexity level matches the active filters, this means that the character will only be included in the filtered list if it satisfies both the search criteria and the complexity filter criteria
        });
        // Update the count of shown heroes vs total heroes in the database
        const count = document.getElementById('count-stats');                               // Get the element that displays the count of shown heroes
        if (count) {    // If the element exists, update its text to show how many heroes are currently displayed out of the total number of heroes in the database, this gives users immediate feedback on how their search and filter criteria are affecting the list
            count.innerText = `Showing ${filtered.length} of ${characters.length} heroes`;  // Set the text to show the count of filtered heroes and total heroes
        }
        // Sort the filtered list based on the current sort settings
        const sorted = [...filtered].sort((a, b) => {
            let valA, valB;
            if (currentSort.startsWith('w')) {                          // If sorting by weight, we need to sort based on the specific player's weight at the index indicated by currentSort[1]
                const idx = parseInt(currentSort[1]);                   // Extract the player index from the sort key, e.g. 'w0' -> 0 for Claudine, 'w1' -> 1 for Joel, etc.
                valA = a.weights[idx]; valB = b.weights[idx];           // Get the weight values for the specified player index from both characters to compare for sorting
            } 
            else if (currentSort.startsWith('d')) {                     // If sorting by date, we need to sort based on the specific player's last played date at the index indicated by currentSort[1]
                const idx = parseInt(currentSort[1]);                   // Extract the player index from the sort key, e.g. 'd0' -> 0 for Claudine, 'd1' -> 1 for Joel, etc.
                valA = (a.lastPlayed && a.lastPlayed[idx]) || "";       // Get the last played date for the specified player index from both characters to compare for sorting, if lastPlayed or the specific index is undefined, default to an empty string to avoid errors
                valB = (b.lastPlayed && b.lastPlayed[idx]) || "";       // Get the last played date for the specified player index from both characters to compare for sorting, if lastPlayed or the specific index is undefined, default to an empty string to avoid errors
                if (valA === "Never") valA = "";                        // If the date is "Never", treat it as an empty string for sorting purposes so that characters that have never been played will be sorted together, this ensures that "Never" dates are consistently sorted either at the beginning or end of the list depending on the sort direction, rather than being treated as a string that could be sorted in an unexpected position
                if (valB === "Never") valB = "";
            } 
            else {                                                      // For regular string sorting (e.g. name, group), we can just compare the strings directly, converting to lowercase for case-insensitive sorting
                valA = (a[currentSort] || "").toLowerCase();            // Get the value of the current sort key from both characters to compare for sorting, if the value is undefined default to an empty string to avoid errors, convert to lowercase for case-insensitive sorting
                valB = (b[currentSort] || "").toLowerCase();
            }

            if (valA < valB) return sortAsc ? -1 : 1;                   // If valA is less than valB, return -1 for ascending sort or 1 for descending sort to position a before b or b before a accordingly
            if (valA > valB) return sortAsc ? 1 : -1;                   // If valA is greater than valB, return 1 for ascending sort or -1 for descending sort to position b before a or a before b accordingly
            return 0;                                                   // If valA and valB are equal, return 0 to keep their relative order unchanged, this ensures a stable sort where characters with the same value for the sort key will maintain their order relative to each other from the original array, which can be important for user experience when sorting by different keys multiple times
        });

        // Generate the HTML for the sorted and filtered list
        container.innerHTML = sorted.map(c => {
            const counts = c.playCount || [0,0,0,0];
            const dates = c.lastPlayed || ["Never", "Never", "Never", "Never"];
            
            // Find the index in the ORIGINAL array so the Edit button works correctly
            const realIdx = characters.findIndex(orig => orig.name === c.name);

            return `
            <div class="char-item">
                <button class="btn-edit-small" onclick="editChar(${realIdx})" style="display: none;">EDIT</button>
                <div class="hero-main-info">
                    <a href="${getHeroLink(c.slug)}" target="_blank">
                        <div class="char-complexity-db">
                            <img src="${getImgUrl(c.slug)}" class="char-img-roll">
                            <img src="images/d${c.complexity}.png" class="complexity-roll">
                        </div>
                    </a>
                    <span class="group-label"> (${c.group || 'Season ?'}) </span>
                </div>
                <div class="hero-details">
                    <div class="hero-header">
                        <span class="hero-name"> ${c.name}</span>
                    </div>
                    <div class="stats-grid">
                        ${[0,1,2,3].map(i => `
                            <div class="player-stat-box" style="border-left-color: ${PLAYER_COLORS[i]}">
                                <div class="stat-row">
                                    <span class="stat-label">${NAMES[i]} %</span>
                                    <span class="stat-value">${totals[i] > 0 ? ((c.weights[i]/totals[i])*100).toFixed(2) : '0.00'}% (${c.weights[i].toFixed(0)})</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Plays</span>
                                    <span class="stat-value">${counts[i]}</span>
                                </div>
                                <span class="stat-date">${dates[i] || 'Never'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
