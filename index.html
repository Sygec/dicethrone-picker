<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne - Group Sync</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
            --edit: #f39c12;
            --p1: #4ecca3; --p2: #45b7d1; --p3: #9b59b6; --p4: #f1c40f;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 2px; }

        /* Player Toggles */
        .player-toggle-zone {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            border: 1px solid var(--secondary);
        }
        .p-chk { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .p-chk input { width: 22px; height: 22px; accent-color: var(--accent); }

        .results { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--secondary); display: flex; flex-direction: column; gap: 10px; }
        .player-row { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 10px; gap: 12px; }
        
        /* Character Dropdown Styling */
        .char-select {
            flex: 1;
            background: #1a1a2e;
            color: white;
            border: 1px solid var(--secondary);
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9rem;
            outline: none;
        }
        .char-select:focus { border-color: var(--accent); }

        .player-label { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; min-width: 60px; }

        #rollBtn { background: var(--accent); width: 100%; padding: 15px; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-confirm { background: #28a745; display: none; width: 100%; padding: 15px; font-size: 1.1rem; }

        .manage-section { background: #0f346055; padding: 15px; border-radius: 10px; margin-top: 30px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .weight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; }
        .weight-grid div { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        
        input { padding: 10px; border-radius: 5px; border: none; background: #1a1a2e; color: white; width: 100%; box-sizing: border-box; }
        
        .char-list { max-height: 350px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #ffffff11; }
        .char-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ffffff11; }
        .w-badges { display: flex; gap: 4px; margin-top: 4px; }
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: bold; color: #000; min-width: 25px; text-align: center; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { color: var(--edit); background: transparent; font-size: 1.2rem; }
        .btn-del { color: var(--danger); background: transparent; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>DICE THRONE</h1>
    
    <div class="player-toggle-zone">
        <label class="p-chk">Claudine <input type="checkbox" id="use0" checked></label>
        <label class="p-chk">Joel <input type="checkbox" id="use1" checked></label>
        <label class="p-chk">Julie <input type="checkbox" id="use2" checked></label>
        <label class="p-chk">Martin <input type="checkbox" id="use3" checked></label>
    </div>

    <div id="results" class="results">
        <p style="text-align: center; opacity: 0.6;">Select who is playing and roll!</p>
    </div>

    <button id="rollBtn" onclick="pickCharacters()">ROLL RANDOMIZER</button>
    <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">LOCK IN SESSION</button>

    <div class="manage-section">
        <h3 id="formTitle">Manage Hero</h3>
        <div class="input-group">
            <input type="text" id="newName" placeholder="Hero Name">
            <input type="text" id="newGroup" placeholder="Season / Group">
            <div class="weight-grid">
                <div>Claudine: <input type="number" id="w0" placeholder="30-300"></div>
                <div>Joel: <input type="number" id="w1" placeholder="30-300"></div>
                <div>Julie: <input type="number" id="w2" placeholder="30-300"></div>
                <div>Martin: <input type="number" id="w3" placeholder="30-300"></div>
            </div>
            <button id="addBtn" style="background:var(--accent)" onclick="handleFormSubmit()">Save Hero</button>
            <button id="cancelEdit" onclick="resetForm()" style="display:none; background:#444;">Cancel</button>
        </div>

        <div class="char-list" id="charList"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxBCHqFOr3K-Vh4-KeTAUt2UM03DJ60nE",
      authDomain: "dicethrone-ba1f1.firebaseapp.com",
      databaseURL: "https://dicethrone-ba1f1-default-rtdb.firebaseio.com",
      projectId: "dicethrone-ba1f1",
      storageBucket: "dicethrone-ba1f1.firebasestorage.app",
      messagingSenderId: "580487401452",
      appId: "1:580487401452:web:94d49e4bff6f3815b63ac9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const NAMES = ["Claudine", "Joel", "Julie", "Martin"];
    const DECAY = 0.33;
    const BOOST = 1.20;
    const MIN_W = 30;
    const MAX_W = 300;

    let characters = [];
    let editIndex = -1;

    function init() {
        db.ref('characters_v4').on('value', snap => {
            characters = snap.val() || [];
            renderList();
        });
    }

    // --- ROLL LOGIC ---
    function pickCharacters() {
        const activeIndices = [];
        NAMES.forEach((_, i) => { if(document.getElementById(`use${i}`).checked) activeIndices.push(i); });

        if(activeIndices.length === 0) return alert("Select players!");

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        activeIndices.forEach(pIdx => {
            const activePool = characters.filter(c => c.weights[pIdx] > 0);
            let selectedCharName = "";

            if(activePool.length > 0) {
                let total = activePool.reduce((sum, c) => sum + c.weights[pIdx], 0);
                let rand = Math.random() * total;
                let sum = 0;
                for(let c of activePool) {
                    sum += c.weights[pIdx];
                    if(rand <= sum) { selectedCharName = c.name; break; }
                }
            }

            // Render row with dropdown
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <div class="player-label" style="color:var(--p${pIdx+1})">${NAMES[pIdx]}</div>
                <select class="char-select" data-player="${pIdx}">
                    ${characters.map(c => `
                        <option value="${c.name}" ${c.name === selectedCharName ? 'selected' : ''} ${c.weights[pIdx] === 0 ? 'disabled' : ''}>
                            ${c.name} ${c.weights[pIdx] === 0 ? '(Locked)' : ''}
                        </option>
                    `).join('')}
                </select>
            `;
            resultsDiv.appendChild(row);
        });

        document.getElementById('confirmBtn').style.display = 'block';
    }

    // --- LOCK IN LOGIC ---
    function applyResults() {
        const dropdowns = document.querySelectorAll('.char-select');
        const sessionPicks = []; // Array of { playerIndex, charName }

        dropdowns.forEach(sel => {
            sessionPicks.push({
                pIdx: parseInt(sel.dataset.player),
                charName: sel.value
            });
        });

        const playingIndices = sessionPicks.map(s => s.pIdx);

        characters.forEach(char => {
            playingIndices.forEach(pIdx => {
                if (char.weights[pIdx] === 0) return; // Ignore permanently disabled

                const wasPickedForThisPlayer = sessionPicks.some(s => s.pIdx === pIdx && s.charName === char.name);
                
                if (wasPickedForThisPlayer) {
                    char.weights[pIdx] = Math.max(MIN_W, char.weights[pIdx] * DECAY);
                } else {
                    char.weights[pIdx] = Math.min(MAX_W, char.weights[pIdx] * BOOST);
                }
            });
        });

        db.ref('characters_v4').set(characters);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color:#28a745; text-align:center; font-weight:bold;">Weights Updated for the Group!</p>`;
    }

    // --- MANAGEMENT LOGIC ---
    function handleFormSubmit() {
        const name = document.getElementById('newName').value.trim();
        const group = document.getElementById('newGroup').value.trim();
        if (!name) return;

        const weights = [
            parseFloat(document.getElementById('w0').value) || 100,
            parseFloat(document.getElementById('w1').value) || 100,
            parseFloat(document.getElementById('w2').value) || 100,
            parseFloat(document.getElementById('w3').value) || 100
        ];

        if (editIndex > -1) {
            characters[editIndex] = { name, group, weights };
        } else {
            characters.push({ name, group, weights });
        }
        
        db.ref('characters_v4').set(characters);
        resetForm();
    }

    function startEdit(name) {
        editIndex = characters.findIndex(c => c.name === name);
        const c = characters[editIndex];
        document.getElementById('newName').value = c.name;
        document.getElementById('newGroup').value = c.group || '';
        c.weights.forEach((w, i) => document.getElementById(`w${i}`).value = Math.round(w));
        document.getElementById('formTitle').innerText = "Edit " + c.name;
        document.getElementById('cancelEdit').style.display = "block";
    }

    function resetForm() {
        editIndex = -1;
        document.querySelectorAll('.manage-section input').forEach(i => i.value = '');
        document.getElementById('formTitle').innerText = "Manage Hero";
        document.getElementById('cancelEdit').style.display = "none";
    }

    function deleteChar(name) {
        if(confirm(`Delete ${name}?`)) {
            characters = characters.filter(c => c.name !== name);
            db.ref('characters_v4').set(characters);
        }
    }

    function renderList() {
        const listDiv = document.getElementById('charList');
        const sorted = [...characters].sort((a,b) => (a.group || '').localeCompare(b.group || '') || a.name.localeCompare(b.name));

        listDiv.innerHTML = sorted.map(c => `
            <div class="char-item">
                <div class="list-details">
                    <span style="font-weight:bold; color:var(--accent)">${c.name}</span>
                    <div class="w-badges">
                        <span class="badge" title="Claudine" style="background:var(--p1)">${Math.round(c.weights[0])}</span>
                        <span class="badge" title="Joel" style="background:var(--p2)">${Math.round(c.weights[1])}</span>
                        <span class="badge" title="Julie" style="background:var(--p3)">${Math.round(c.weights[2])}</span>
                        <span class="badge" title="Martin" style="background:var(--p4)">${Math.round(c.weights[3])}</span>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn-edit" onclick="startEdit('${c.name.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn-del" onclick="deleteChar('${c.name.replace(/'/g, "\\'")}')">×</button>
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
