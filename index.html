<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne</title>

    <!-- Stylesheets: We will dynamically load either the production or development stylesheet based on the hostname -->
    <script>
        // Check if this is Production or Local environment based on hostname
        window.isProd = window.location.hostname === "sygec.github.io" || window.location.hostname === "dicethrone-prod.sygec.workers.dev"; 
        // Create a new link element
        const themeLink = document.createElement('link');
        themeLink.rel = 'stylesheet';
        // Assign the file path based on if this is prod or dev
        themeLink.href = window.isProd ? 'style-prod.css' : 'style-dev.css';
        // Append it to the head
        document.head.appendChild(themeLink);
    </script>
    <!-- Additionnally, link the common stylesheet -->
    <link rel="stylesheet" type="text/css" href="style.css">

</head>

<body>
    <main class="container">
        <h1>Dice Throne</h1>
        <div class="small-text">
            v<button id="version-number" aria-label="View changelog" style="background:none; border:none; color:inherit; font:inherit; cursor:pointer; text-decoration:underline; padding:0;">...</button>
            | <button id="auth-btn" style="background:none; border:none; color:inherit; font:inherit; cursor:pointer; text-decoration:underline; padding:0;">Login</button>
        </div>

        <!-- Changelog Modal -->
        <div id="changelog-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Change Log</h2>
            <hr>
            <div id="changelog-container"></div>
        </div>
        </div>   
        
        <!-- Winner Selection Modal -->
        <div id="winner-modal" class="modal">
            <div class="modal-content">
                <span class="close-button" onclick="closeWinnerModal()">&times;</span>
                <h2 style="color: black; margin-top: 0;">Select Winner</h2>
                <div id="winner-selection-container" style="margin: 20px 0;"></div>
                <button type="button" class="btn-save" id="confirm-winner-btn">Confirm Winner</button>
            </div>
        </div>

        <!-- Login Modal -->
        <div id="login-modal" class="modal">
            <div class="modal-content">
                <span class="close-button" onclick="closeLoginModal()">&times;</span>
                <h2 style="color: black; margin-top: 0;">Admin Login</h2>
                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                    <input type="email" id="login-email" placeholder="Email" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: black;">
                    <input type="password" id="login-password" placeholder="Password" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; color: black;">
                    <button type="button" class="btn-save" onclick="handleLogin()">Sign In</button>
                    <div id="login-error" style="color: var(--danger); font-size: 0.8rem; text-align: center; display: none; margin-top: 5px;"></div>
                </div>
            </div>
        </div>

        <!-- Player Selection Toggles -->
        <div class="player-toggle-zone-top" id="player-toggle-zone-top"></div>

        <!-- Dropdown Sort Options -->
        <div class="dropdown-sort-options">
            <label><input type="radio" name="dropdownSort" value="name" checked onchange="updateDropdownSort()"> By Name</label>
            <label><input type="radio" name="dropdownSort" value="weight" onchange="updateDropdownSort()"> By Percentage</label>
        </div>

        <!-- Randomizer Results Area -->
        <section id="results" class="results" aria-live="polite"><p style="text-align: center; opacity: 0.6;">Select players and roll.</p></section>

        <!-- Validation Error Message -->
        <div id="error-msg" role="alert">⚠ Duplicate hero selected! Each player must have a unique character.</div>

        <!-- Action Buttons -->
        <button id="rollBtn" type="button" onclick="pickCharacters()">ROLL RANDOMIZER</button>
        <button id="confirmBtn" type="button" class="btn-confirm" onclick="applyResults()">LOCK IN SESSION</button>

        <!-- Hero Database & Stats Section -->
        <button type="button" class="db-toggle-btn" id="dbToggleBtn" onclick="toggleDatabase()">📂 Show Hero Database & Stats</button>

        <section id="dbSection" class="hidden">

            <!-- Search & Filtering -->
            <div class="search-container">
                <div class="search-wrapper">
                    <input class="search-bar" type="text" id="hero-search" style="font-size: 16px;" placeholder="Search Heroes or Groups..." oninput="handleSearchInput()" aria-label="Search heroes by name or group">
                    <div class="search-actions">
                        <img src="images/icons/close.png" id="clear-search" class="search-icon hidden" onclick="clearSearch()" alt="Clear" title="Clear Search">
                        <img src="images/icons/sort.png" id="sort-toggle" class="search-icon" onclick="toggleSort()" alt="Sort" title="Toggle Sort Section">
                    </div>
                </div>
                <div class="small-text" id="count-stats">
                    Showing 0 of 0 heroes
                </div>
            </div>

            <div id="sort-section" class="hidden">
                <div class="sort-controls">
                    <div class="sort-row">
                        <div id="player-sort-container" class="player-toggle-zone"></div>
                    </div>
                </div>
                <!-- Complexity Filter -->
                <div class="dice-filter-section" style="margin-bottom: 20px;">
                    <div class="dice-bar">
                        <img src="images/d1.png" class="dice-icon" id="dice-1" onclick="toggleLevel(1)" title="Level 1">
                        <img src="images/d2.png" class="dice-icon" id="dice-2" onclick="toggleLevel(2)" title="Level 2">
                        <img src="images/d3.png" class="dice-icon" id="dice-3" onclick="toggleLevel(3)" title="Level 3">
                        <img src="images/d4.png" class="dice-icon" id="dice-4" onclick="toggleLevel(4)" title="Level 4">
                        <img src="images/d5.png" class="dice-icon" id="dice-5" onclick="toggleLevel(5)" title="Level 5">
                        <img src="images/d6.png" class="dice-icon" id="dice-6" onclick="toggleLevel(6)" title="Level 6">
                        <img src="images/d_all.png" class="dice-icon" id="dice-all" onclick="toggleLevel('all')" title="All Levels">
                    </div>
                </div>
            </div>

            <div id="heroContainer"></div>
        </section>

        <!-- Games History Section -->
        <button type="button" class="db-toggle-btn" id="gamesToggleBtn" onclick="toggleGames()">🎲 Show Games History</button>

        <section id="gamesSection" class="hidden">
            <div class="small-text" id="game-count-stats" style="margin-top: 15px;">
                Showing 0 of 0 games
            </div>
            <div id="gamesContainer" style="margin-top: 20px;"></div>
        </section>

        <!-- Admin & Data Management -->
        <button type="button" class="admin-toggle-btn" onclick="toggleAdmin()">⚠ Show Admin Section</button>
        <section id="adminSection" class="hidden">
            <div id="admin-build-info"></div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h3>Manage Groups</h3>
                    <button type="button" class="panel-toggle" aria-expanded="false" onclick="toggleAdminPanel(event, 'groupsPanel')">V</button>
                </div>
                <div id="groupsPanel" class="panel-content hidden">
                    <div style="margin-bottom: 15px;">
                        <button type="button" class="btn-save" id="addGroupBtn" onclick="toggleGroupForm()">Add Group</button>
                    </div>
                    <div id="groupForm" class="manage-form hidden" style="border-bottom: 1px solid #ffffff22; padding-bottom: 20px; margin-bottom: 20px;">
                        <h3 style="margin-top:0; font-size: 1rem; color: var(--accent);">Groups</h3>
                        <div class="form-grid">
                            <input type="text" id="groupName" style="font-size: 16px;" placeholder="Group Name">
                            <input type="text" id="groupType" style="font-size: 16px;" placeholder="Type (optional)">
                            <input type="number" id="groupOrder" style="font-size: 16px;" placeholder="Order Index">
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="button" class="btn-save" id="saveGroupBtn" onclick="saveGroup()">Save Group</button>
                            <button type="button" class="btn-cancel" id="cancelGroupBtn" onclick="resetGroupForm()" style="display:none;">Cancel</button>
                        </div>
                    </div>
                    <div id="groupsListContainer" style="margin-top: 15px;"></div>
                </div>
            </div>

            <div class="admin-panel">
                <div class="panel-header">
                    <h3>Manage Heroes</h3>
                    <button type="button" class="panel-toggle" aria-expanded="false" onclick="toggleAdminPanel(event, 'heroesPanel')">V</button>
                </div>
                <div id="heroesPanel" class="panel-content hidden">
                    <div class="manage-form">
                        <h3 id="formTitle" style="margin-top:0; font-size: 1rem; color: var(--accent);">Add New Hero</h3>
                        <div class="form-grid">
                            <input type="text" id="charName" style="font-size: 16px;" placeholder="Hero Name">
                            <select id="charGroup" style="font-size: 16px;" aria-label="Select group">
                                <option value="">-- Select Group --</option>
                            </select>
                            <input type="text" id="charSlug" style="font-size: 16px;" placeholder="Slug (for image)">
                            <input type="text" id="charComplexity" style="font-size: 16px;" placeholder="Complexity level">
                        </div>
                        <button type="button" class="btn-save" id="saveBtn" onclick="saveCharacter()">Save Hero</button>
                        <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
                    </div>
                </div>
            </div>

            <!-- <div style="margin-top:20px; border-top: 1px solid #ffffff22; padding-top:15px;">
                <button type="button" class="btn-danger" onclick="resetAllWeights()">RESET PROBABILITIES TO 100</button>
                <button type="button" class="btn-danger" onclick="resetAllStats()">RESET PLAY COUNTS & DATES</button>
            </div> -->
        </section>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./javascript/dice-throne.js"></script>

</body>
</html>
