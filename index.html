<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne - Discovery Suite</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
            --edit: #f39c12;
            --p1: #4ecca3; --p2: #45b7d1; --p3: #9b59b6; --p4: #f1c40f; --p5: #a2a2a2;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 550px; width: 100%; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

        .player-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-weight: bold; color: #1a1a2e; font-size: 0.75rem; text-transform: uppercase; text-align: center; min-width: 70px; }
        .player-toggle-zone { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; border: 1px solid var(--secondary); }
        .p-chk { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .p-chk input { width: 22px; height: 22px; accent-color: var(--accent); }

        .results { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 2px solid var(--secondary); }
        .player-row { display: flex; align-items: flex-start; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 10px; gap: 12px; margin-bottom: 8px; }
        .char-img-roll { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; border: 1px solid var(--accent); }
        .roll-stats { font-size: 0.65rem; color: #aaa; margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }
        .char-select { flex: 1; background: #1a1a2e; color: white; border: 1px solid var(--secondary); padding: 10px; border-radius: 5px; outline: none; width: 100%; }
        /* Validation Styling */
        .char-select.error { border-color: var(--danger); background: #301014; }
        #error-msg { color: var(--danger); font-size: 0.85rem; font-weight: bold; text-align: center; margin: 10px 0; display: none; background: rgba(148, 27, 45, 0.1); padding: 8px; border-radius: 5px; border: 1px solid var(--danger); }

        #rollBtn { background: var(--accent); width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: #28a745; display: none; width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-confirm.disabled { background: #444 !important; opacity: 0.5; cursor: not-allowed; }

        .db-toggle-btn { background: var(--secondary); color: white; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 25px 0 15px 0; text-transform: uppercase; font-size: 0.8rem; }
        #dbSection { display: none; width: 100%; }

        /* Management Form */
        .manage-form { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--secondary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input[type="text"] { background: #1a1a2e; color: white; border: 1px solid var(--secondary); padding: 10px; border-radius: 5px; font-size: 0.9rem; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #444; color: white; border: none; padding: 8px; border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 0.8rem; }

        .char-item { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--secondary); display: flex; gap: 15px; position: relative; }
        .btn-edit-small { position: absolute; top: 10px; right: 10px; background: var(--edit); border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; cursor: pointer; color: #1a1a2e; }
        .list-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 2px solid var(--accent); }
        .hero-details { flex: 1; }
        .hero-name { font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-bottom: 8px; display: block; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .player-stat-box { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; border-left: 3px solid transparent; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .stat-label { font-size: 0.6rem; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 0.7rem; font-weight: bold; }
        .stat-date { font-size: 0.55rem; color: #666; display: block; text-align: right; margin-top: 2px; }

        .sort-controls { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; justify-content: center; }
        .btn-sort { border: none; padding: 6px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Throne</h1>
    
    <div class="player-toggle-zone">
        <label class="p-chk"><span class="player-tag" style="background:var(--p1)">Claudine</span> <input type="checkbox" id="use0" checked></label>
        <label class="p-chk"><span class="player-tag" style="background:var(--p2)">Joel</span> <input type="checkbox" id="use1" checked></label>
        <label class="p-chk"><span class="player-tag" style="background:var(--p3)">Julie</span> <input type="checkbox" id="use2" checked></label>
        <label class="p-chk"><span class="player-tag" style="background:var(--p4)">Martin</span> <input type="checkbox" id="use3" checked></label>
        <label class="p-chk"><span class="player-tag" style="background:var(--p5)">Invitee</span> <input type="checkbox" id="use4"></label>
    </div>

    <div id="results" class="results"><p style="text-align: center; opacity: 0.6;">Select players and roll.</p></div>

    <div id="error-msg">⚠ Duplicate hero selected! Each player must have a unique character.</div>
    <button id="rollBtn" onclick="pickCharacters()">ROLL RANDOMIZER</button>
    <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">LOCK IN SESSION</button>

    <button class="db-toggle-btn" onclick="toggleDatabase()">📂 Show Hero Database & Stats</button>

    <div id="dbSection">
        <div class="manage-form">
            <h3 id="formTitle" style="margin-top:0; font-size: 1rem; color: var(--accent);">Add New Hero</h3>
            <div class="form-grid">
                <input type="text" id="charName" placeholder="Hero Name">
                <input type="text" id="charGroup" placeholder="Group (e.g. Season 1)">
                <input type="text" id="charSlug" placeholder="Slug (for image)">
            </div>
            <button class="btn-save" id="saveBtn" onclick="saveCharacter()">Save Hero</button>
            <button class="btn-cancel" id="cancelBtn" onclick="resetForm()" style="display:none;">Cancel Edit</button>
        </div>

        <div class="sort-controls">
            <button class="btn-sort" onclick="setSort('name')">Name</button>
            <button class="btn-sort" onclick="setSort('group')">Group</button>
            <button class="btn-sort" style="background:var(--p1)" onclick="setSort('w0')">C %</button>
            <button class="btn-sort" style="background:var(--p2)" onclick="setSort('w1')">J %</button>
            <button class="btn-sort" style="background:var(--p3)" onclick="setSort('w2')">Ju %</button>
            <button class="btn-sort" style="background:var(--p4)" onclick="setSort('w3')">M %</button>
        </div>
        <div id="heroContainer"></div>

        <div style="margin-top:20px; border-top: 1px solid #ffffff22; padding-top:15px;">
            <button class="btn-danger" onclick="resetAllWeights()">RESET PROBABILITIES TO 100</button>
            <button class="btn-danger" onclick="resetAllStats()">RESET PLAY COUNTS & DATES</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {apiKey: "AIzaSyDxBCHqFOr3K-Vh4-KeTAUt2UM03DJ60nE", authDomain: "dicethrone-ba1f1.firebaseapp.com", databaseURL: "https://dicethrone-ba1f1-default-rtdb.firebaseio.com", projectId: "dicethrone-ba1f1", storageBucket: "dicethrone-ba1f1.firebasestorage.app", messagingSenderId: "580487401452", appId: "1:580487401452:web:94d49e4bff6f3815b63ac9"};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const NAMES = ["Claudine", "Joel", "Julie", "Martin", "Invitee"];
    const PLAYER_COLORS = ['var(--p1)', 'var(--p2)', 'var(--p3)', 'var(--p4)'];
    let characters = [];
    let currentSort = 'group';
    let sortAsc = true;
    let editIndex = -1;

    const getImgUrl = (slug) => slug ? `https://dice-throne.rulepop.com/heroes/${slug}.webp` : "";
    const getHeroLink = (slug) => `https://dice-throne.rulepop.com/#hero/${slug}`;

    function init() {
        db.ref('characters_v4').on('value', snap => {
            characters = snap.val() || [];
            renderList();
        });
    }

    function toggleDatabase() {
        const s = document.getElementById('dbSection');
        const b = document.querySelector('.db-toggle-btn');
        const isHidden = s.style.display !== "block";
        s.style.display = isHidden ? "block" : "none";
        b.innerText = isHidden ? "📁 Hide Hero Database" : "📂 Show Hero Database & Stats";
    }

    /* --- MANAGEMENT LOGIC --- */
    function saveCharacter() {
        const name = document.getElementById('charName').value.trim();
        const group = document.getElementById('charGroup').value.trim();
        const slug = document.getElementById('charSlug').value.trim();
        if(!name) return alert("Name is required");

        if (editIndex > -1) {
            characters[editIndex] = { ...characters[editIndex], name, group, slug };
        } else {
            characters.push({
                name, group, slug,
                weights: [100, 100, 100, 100],
                playCount: [0, 0, 0, 0],
                lastPlayed: ["", "", "", ""]
            });
        }
        db.ref('characters_v4').set(characters);
        resetForm();
    }

    function editChar(idx) {
        editIndex = idx;
        const c = characters[idx];
        document.getElementById('charName').value = c.name;
        document.getElementById('charGroup').value = c.group || "";
        document.getElementById('charSlug').value = c.slug || "";
        document.getElementById('formTitle').innerText = "Edit Hero: " + c.name;
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('dbSection').scrollIntoView();
    }

    function resetForm() {
        editIndex = -1;
        document.getElementById('charName').value = "";
        document.getElementById('charGroup').value = "";
        document.getElementById('charSlug').value = "";
        document.getElementById('formTitle').innerText = "Add New Hero";
        document.getElementById('cancelBtn').style.display = "none";
    }

    /* --- ROLLING LOGIC --- */
    function pickCharacters() {
        let active = [];
        NAMES.forEach((_, i) => { if(document.getElementById(`use${i}`).checked) active.push(i); });
        if(active.length === 0) return alert("Select players!");
        
        active = active.sort(() => Math.random() - 0.5);
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        let pool = JSON.parse(JSON.stringify(characters));

        active.forEach(pIdx => {
            let selectedName = "";
            if (pIdx === 4) { // Invitee
                const r = Math.floor(Math.random() * pool.length);
                selectedName = pool[r]?.name;
                pool.splice(r, 1);
            } else { // Scaled Random
                const activePool = pool.filter(c => c.weights[pIdx] > 0);
                let totalScaled = activePool.reduce((sum, c) => sum + (c.weights[pIdx] / (((c.playCount?.[pIdx]) || 0) + 1)), 0);
                let rand = Math.random() * totalScaled;
                let runningSum = 0;
                for(let c of activePool) {
                    runningSum += (c.weights[pIdx] / (((c.playCount?.[pIdx]) || 0) + 1));
                    if(rand <= runningSum) { 
                        selectedName = c.name; 
                        pool.splice(pool.findIndex(p => p.name === selectedName), 1);
                        break; 
                    }
                }
            }
            renderPlayerRow(pIdx, selectedName);
        });
        validateSelection(); // Run validation after roll
        document.getElementById('confirmBtn').style.display = 'block';
    }

    function renderPlayerRow(pIdx, selectedName) {
        const charData = characters.find(c => c.name === selectedName);
        const resultsDiv = document.getElementById('results');
        const plays = (charData?.playCount && charData.playCount[pIdx]) || 0;
        const last = (charData?.lastPlayed && charData.lastPlayed[pIdx]) || "Never";

        resultsDiv.innerHTML += `
            <div class="player-row">
                <a href="${getHeroLink(charData?.slug)}" target="_blank" id="link-${pIdx}">
                    <img src="${getImgUrl(charData?.slug)}" class="char-img-roll" id="img-${pIdx}">
                </a>
                <div style="flex:1">
                    <div style="margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                        <span class="player-tag" style="background:var(--p${pIdx+1})">${NAMES[pIdx]}</span>
                        ${pIdx < 4 ? `<div class="roll-stats"><span>Plays: <b>${plays}</b></span><span>Last: <b>${last}</b></span></div>` : ''}
                    </div>
                    <select class="char-select" data-player="${pIdx}" onchange="handleDropdownChange(this)">
                        ${characters.map(c => `<option value="${c.name}" ${c.name === selectedName ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                </div>
            </div>`;
    }

    function handleDropdownChange(el) {
        const pIdx = parseInt(el.dataset.player);
        const char = characters.find(c => c.name === el.value);
        document.getElementById(`img-${pIdx}`).src = getImgUrl(char.slug);
        document.getElementById(`link-${pIdx}`).href = getHeroLink(char.slug);
        
        const statsDiv = el.closest('.player-row').querySelector('.roll-stats');
        if (statsDiv && pIdx < 4) {
            statsDiv.innerHTML = `<span>Plays: <b>${(char.playCount?.[pIdx] || 0)}</b></span><span>Last: <b>${(char.lastPlayed?.[pIdx] || 'Never')}</b></span>`;
        }
        validateSelection(); // Check for duplicates after manual change
    }

    /* --- VALIDATION LOGIC --- */
    function validateSelection() {
        const dropdowns = document.querySelectorAll('.char-select');
        const names = Array.from(dropdowns).map(d => d.value);
        const hasDupes = names.some((name, idx) => names.indexOf(name) !== idx);
        
        const confirmBtn = document.getElementById('confirmBtn');
        const errorMsg = document.getElementById('error-msg');
        
        confirmBtn.classList.toggle('disabled', hasDupes);
        confirmBtn.disabled = hasDupes;
        errorMsg.style.display = hasDupes ? 'block' : 'none';
        
        dropdowns.forEach(d => {
            const isDupe = names.filter(n => n === d.value).length > 1;
            d.classList.toggle('error', isDupe);
        });
    }

    function applyResults() {
        const dropdowns = document.querySelectorAll('.char-select');
        const today = new Date().toLocaleDateString('en-CA');
        const picks = Array.from(dropdowns).map(sel => ({ pIdx: parseInt(sel.dataset.player), charName: sel.value }));

        characters.forEach(char => {
            [0,1,2,3].forEach(pIdx => {
                const pick = picks.find(s => s.pIdx === pIdx);
                const wasPicked = pick && pick.charName === char.name;
                if (picks.some(s => s.pIdx === pIdx)) {
                    char.weights[pIdx] = wasPicked ? Math.max(30, char.weights[pIdx] * 0.33) : Math.min(300, char.weights[pIdx] * 1.20);
                }
                if (wasPicked) {
                    if (!char.playCount) char.playCount = [0,0,0,0];
                    if (!char.lastPlayed) char.lastPlayed = ["","","",""];
                    char.playCount[pIdx] = (char.playCount[pIdx] || 0) + 1;
                    char.lastPlayed[pIdx] = today;
                }
            });
        });
        db.ref('characters_v4').set(characters);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color:#28a745; text-align:center; font-weight:bold;">Legacy Stats Updated!</p>`;
    }

    /* --- LIST & HELPERS --- */
    function resetAllWeights() { if(confirm("Reset all probabilities to 100?")) { characters.forEach(c => c.weights = [100, 100, 100, 100]); db.ref('characters_v4').set(characters); } }
    function resetAllStats() { if(confirm("Reset all play history?")) { characters.forEach(c => { c.playCount = [0,0,0,0]; c.lastPlayed = ["","","",""]; }); db.ref('characters_v4').set(characters); } }
    function setSort(key) { if (currentSort === key) sortAsc = !sortAsc; else { currentSort = key; sortAsc = true; } renderList(); }

    function renderList() {
        const container = document.getElementById('heroContainer');
        const totals = [0, 1, 2, 3].map(i => characters.reduce((sum, c) => sum + c.weights[i], 0));
        const sorted = [...characters].sort((a, b) => {
            let valA, valB;
            if (currentSort.startsWith('w')) {
                const idx = parseInt(currentSort[1]);
                valA = a.weights[idx]; valB = b.weights[idx];
            } else {
                valA = (a[currentSort] || "").toLowerCase(); valB = (b[currentSort] || "").toLowerCase();
            }
            return (valA < valB ? -1 : 1) * (sortAsc ? 1 : -1);
        });

        container.innerHTML = sorted.map(c => {
            const counts = c.playCount || [0,0,0,0];
            const dates = c.lastPlayed || ["Never", "Never", "Never", "Never"];
            const realIdx = characters.findIndex(orig => orig.name === c.name);
            return `
            <div class="char-item">
                <button class="btn-edit-small" onclick="editChar(${realIdx})">EDIT</button>
                <div class="hero-main-info"><a href="${getHeroLink(c.slug)}" target="_blank"><img src="${getImgUrl(c.slug)}" class="list-thumb"></a></div>
                <div class="hero-details">
                    <div class="hero-header"><span class="group-label">${c.group || 'Season ?'}</span><span class="hero-name">${c.name}</span></div>
                    <div class="stats-grid">
                        ${[0,1,2,3].map(i => `
                            <div class="player-stat-box" style="border-left-color: ${PLAYER_COLORS[i]}">
                                <div class="stat-row"><span class="stat-label">${NAMES[i].charAt(0)} %</span><span class="stat-value">${totals[i] > 0 ? ((c.weights[i]/totals[i])*100).toFixed(2) : '0.00'}%</span></div>
                                <div class="stat-row"><span class="stat-label">Plays</span><span class="stat-value">${counts[i]}</span></div>
                                <span class="stat-date">${dates[i] || 'Never'}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    init();
</script>
</body>
</html>
