<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne Randomizer</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { max-width: 500px; width: 100%; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 10px; }

        .results {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            min-height: 120px;
            margin-bottom: 20px;
            border: 2px solid var(--secondary);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        .char-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 15px;
            border: 1px solid var(--accent);
            background: var(--bg);
        }

        .player-info { display: flex; flex-direction: column; }
        .player-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .character-name { font-weight: bold; color: var(--accent); font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-confirm { background: #28a745; grid-column: span 3; margin-top: 10px; display: none; font-weight: bold; }

        .manage-section {
            background: #0f346055;
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input {
            padding: 12px;
            border-radius: 5px;
            border: none;
            background: #1a1a2e;
            color: white;
            font-size: 0.9rem;
        }

        .char-list { margin-top: 10px; max-height: 300px; overflow-y: auto; border-top: 1px solid #ffffff11; }
        .char-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #ffffff11;
        }

        .list-thumb { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; margin-right: 10px; }
        .char-meta { display: flex; align-items: center; }
        .btn-del-single { background: transparent; color: #ff4444; font-size: 1.2rem; padding: 5px 10px; }

        .danger-zone { margin-top: 25px; display: flex; gap: 10px; }
        .btn-danger { background: var(--danger); font-size: 0.75rem; padding: 10px; flex: 1; }
        .btn-neutral { background: #444; font-size: 0.75rem; padding: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dice Throne</h1>
    
    <div id="results" class="results">
        <p style="text-align: center; opacity: 0.6;">Choose players...</p>
    </div>

    <div class="controls">
        <button onclick="pickCharacters(2)">2P</button>
        <button onclick="pickCharacters(3)">3P</button>
        <button onclick="pickCharacters(4)">4P</button>
        <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">Confirm Session</button>
    </div>

    <div class="manage-section">
        <h3>Add to Collection</h3>
        <div class="input-group">
            <input type="text" id="newName" placeholder="Hero Name (e.g. Monk)">
            <input type="text" id="newUrl" placeholder="Image URL (Optional)">
            <button onclick="addNewCharacter()" style="width: 100%; font-weight: bold;">Add Character</button>
        </div>
        
        <div class="char-list" id="charList"></div>

        <div class="danger-zone">
            <button class="btn-neutral" onclick="resetWeights()">Reset Odds</button>
            <button class="btn-danger" onclick="clearCharacterList()">Clear All</button>
        </div>
    </div>
</div>

<script>
    const WEIGHT_DECAY = 0.25;
    const WEIGHT_BOOST = 1.10;
    const DEFAULT_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e94560'%3E%3Cpath d='M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z'/%3E%3C/svg%3E";
    
    let characters = [];
    let currentSelection = [];

    function init() {
        const saved = localStorage.getItem('dt_characters_v2');
        if (saved) {
            characters = JSON.parse(saved);
        } else {
            // Sample data to start
            const starters = ["Barbarian", "Moon Elf", "Monk", "Paladin"];
            characters = starters.map(name => ({ name, weight: 100, url: "" }));
            saveToStorage();
        }
        renderList();
    }

    function pickCharacters(count) {
        if (characters.length < count) {
            alert(`Need ${count} characters!`);
            return;
        }

        currentSelection = [];
        let tempPool = JSON.parse(JSON.stringify(characters));
        
        for (let i = 0; i < count; i++) {
            let totalWeight = tempPool.reduce((sum, c) => sum + c.weight, 0);
            let random = Math.random() * totalWeight;
            let currentSum = 0;
            
            for (let j = 0; j < tempPool.length; j++) {
                currentSum += tempPool[j].weight;
                if (random <= currentSum) {
                    currentSelection.push(tempPool[j]);
                    tempPool.splice(j, 1); 
                    break;
                }
            }
        }
        displayResults();
    }

    function displayResults() {
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = currentSelection.map((char, index) => `
            <div class="player-row">
                <img src="${char.url || DEFAULT_IMG}" class="char-thumb" onerror="this.src='${DEFAULT_IMG}'">
                <div class="player-info">
                    <span class="player-label">Player ${index + 1}</span>
                    <span class="character-name">${char.name}</span>
                </div>
            </div>
        `).join('');
        document.getElementById('confirmBtn').style.display = 'block';
    }

    function applyResults() {
        const selectedNames = currentSelection.map(s => s.name);
        characters.forEach(char => {
            char.weight = selectedNames.includes(char.name) ? char.weight * WEIGHT_DECAY : char.weight * WEIGHT_BOOST;
        });
        saveAndRefresh();
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color: #28a745; text-align:center; font-weight:bold;">Session Saved!</p>`;
    }

    function addNewCharacter() {
        const nameInput = document.getElementById('newName');
        const urlInput = document.getElementById('newUrl');
        const name = nameInput.value.trim();
        const url = urlInput.value.trim();
        
        if (!name) return;

        const weights = characters.map(c => c.weight).sort((a, b) => a - b);
        let startingWeight = 100;
        if (weights.length > 0) {
            const mid = Math.floor(weights.length / 2);
            startingWeight = weights.length % 2 !== 0 ? weights[mid] : (weights[mid - 1] + weights[mid]) / 2;
        }

        characters.push({ name, weight: startingWeight, url });
        nameInput.value = '';
        urlInput.value = '';
        saveAndRefresh();
    }

    function deleteCharacter(name) {
        if (confirm(`Remove ${name}?`)) {
            characters = characters.filter(c => c.name !== name);
            saveAndRefresh();
        }
    }

    function resetWeights() {
        if (confirm("Reset all odds?")) {
            characters.forEach(c => c.weight = 100);
            saveAndRefresh();
        }
    }

    function clearCharacterList() {
        if (confirm("Delete everything?")) {
            characters = [];
            saveAndRefresh();
        }
    }

    function saveToStorage() {
        localStorage.setItem('dt_characters_v2', JSON.stringify(characters));
    }

    function saveAndRefresh() {
        saveToStorage();
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('charList');
        const sorted = [...characters].sort((a, b) => a.name.localeCompare(b.name));
        
        if (characters.length === 0) {
            listDiv.innerHTML = `<p style="text-align:center; font-style:italic; padding: 20px;">Empty</p>`;
            return;
        }

        listDiv.innerHTML = sorted.map(c => `
            <div class="char-item">
                <div class="char-meta">
                    <img src="${c.url || DEFAULT_IMG}" class="list-thumb" onerror="this.src='${DEFAULT_IMG}'">
                    <span>${c.name}</span>
                </div>
                <button class="btn-del-single" onclick="deleteCharacter('${c.name.replace(/'/g, "\\'")}')">×</button>
            </div>
        `).join('');
    }

    init();
</script>

</body>
</html>
