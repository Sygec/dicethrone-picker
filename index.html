<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Throne - Probability Sync</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text: #ffffff;
            --secondary: #0f3460;
            --danger: #941b2d;
            --edit: #f39c12;
            --p1: #4ecca3; --p2: #45b7d1; --p3: #9b59b6; --p4: #f1c40f; --p5: #a2a2a2;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 500px; width: 100%; }
        h1 { text-align: center; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; }

        .player-toggle-zone {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            border: 1px solid var(--secondary);
        }
        .p-chk { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .p-chk input { width: 22px; height: 22px; accent-color: var(--accent); }

        .results { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 2px solid var(--secondary); display: flex; flex-direction: column; gap: 10px; }
        .player-row { display: flex; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 10px; gap: 12px; }
        
        .char-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--accent); }
        .char-select { flex: 1; background: #1a1a2e; color: white; border: 1px solid var(--secondary); padding: 8px; border-radius: 5px; font-size: 0.9rem; outline: none; }
        .char-select.error { border-color: var(--danger); background: #301014; }

        .player-label { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; min-width: 60px; }

        #error-msg { color: #ff4d4d; font-size: 0.8rem; font-weight: bold; text-align: center; margin-bottom: 10px; display: none; }

        #rollBtn { background: var(--accent); width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-confirm { background: #28a745; display: none; width: 100%; padding: 15px; font-size: 1.1rem; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-confirm.disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }

        .manage-section { background: #0f346055; padding: 15px; border-radius: 10px; margin-top: 30px; }
        .weight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; }
        .weight-grid div { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        
        input { padding: 10px; border-radius: 5px; border: none; background: #1a1a2e; color: white; width: 100%; box-sizing: border-box; }
        
        .char-list { max-height: 400px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #ffffff11; }
        .char-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ffffff11; }
        .list-thumb { width: 35px; height: 35px; border-radius: 4px; object-fit: cover; margin-right: 10px; }
        .w-badges { display: flex; gap: 4px; margin-top: 4px; }
        .badge { font-size: 0.6rem; padding: 2px 4px; border-radius: 3px; font-weight: bold; color: #000; min-width: 32px; text-align: center; }
        
        .danger-zone { margin-top: 20px; border-top: 1px solid #ffffff22; padding-top: 15px; }
        .btn-reset { background: var(--danger); color: white; border: none; padding: 10px; border-radius: 5px; font-size: 0.75rem; width: 100%; cursor: pointer; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>DICE THRONE</h1>
    
    <div class="player-toggle-zone">
        <label class="p-chk">Claudine <input type="checkbox" id="use0" checked></label>
        <label class="p-chk">Joel <input type="checkbox" id="use1" checked></label>
        <label class="p-chk">Julie <input type="checkbox" id="use2" checked></label>
        <label class="p-chk">Martin <input type="checkbox" id="use3" checked></label>
        <label class="p-chk">Invitee <input type="checkbox" id="use4"></label>
    </div>

    <div id="results" class="results">
        <p style="text-align: center; opacity: 0.6;">Select players and roll.</p>
    </div>

    <div id="error-msg">⚠ Duplicate character selected!</div>

    <button id="rollBtn" onclick="pickCharacters()">ROLL RANDOMIZER</button>
    <button id="confirmBtn" class="btn-confirm" onclick="applyResults()">LOCK IN SESSION</button>

    <div class="manage-section">
        <h3 id="formTitle">Add/Edit Hero</h3>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <input type="text" id="newName" placeholder="Hero Name">
            <input type="text" id="newGroup" placeholder="Season / Group">
            <input type="text" id="newUrl" placeholder="Image URL">
            <div class="weight-grid">
                <div>Claudine: <input type="number" id="w0"></div>
                <div>Joel: <input type="number" id="w1"></div>
                <div>Julie: <input type="number" id="w2"></div>
                <div>Martin: <input type="number" id="w3"></div>
            </div>
            <button style="background:var(--accent); color:white; padding:10px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="handleFormSubmit()">Save Hero</button>
            <button id="cancelEdit" onclick="resetForm()" style="display:none; background:#444; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">Cancel</button>
        </div>

        <div class="char-list" id="charList"></div>

        <div class="danger-zone">
            <button class="btn-reset" onclick="resetAllWeights()">Reset Core Weights to 100</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {apiKey: "AIzaSyDxBCHqFOr3K-Vh4-KeTAUt2UM03DJ60nE", authDomain: "dicethrone-ba1f1.firebaseapp.com", databaseURL: "https://dicethrone-ba1f1-default-rtdb.firebaseio.com", projectId: "dicethrone-ba1f1", storageBucket: "dicethrone-ba1f1.firebasestorage.app", messagingSenderId: "580487401452", appId: "1:580487401452:web:94d49e4bff6f3815b63ac9"};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const NAMES = ["Claudine", "Joel", "Julie", "Martin", "Invitee"];
    const DECAY = 0.33;
    const BOOST = 1.20;
    const MIN_W = 30;
    const MAX_W = 300;
    const DEFAULT_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e94560'%3E%3Cpath d='M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z'/%3E%3C/svg%3E";

    let characters = [];
    let editIndex = -1;

    function init() {
        db.ref('characters_v4').on('value', snap => {
            characters = snap.val() || [];
            renderList();
        });
    }

    function pickCharacters() {
        const activeIndices = [];
        NAMES.forEach((_, i) => { if(document.getElementById(`use${i}`).checked) activeIndices.push(i); });

        if(activeIndices.length === 0) return alert("Select players!");

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        let pool = JSON.parse(JSON.stringify(characters));

        activeIndices.forEach(pIdx => {
            let selectedCharName = "";
            
            if (pIdx === 4) { // Invitee logic: Pure Random
                if (pool.length > 0) {
                    const randIdx = Math.floor(Math.random() * pool.length);
                    selectedCharName = pool[randIdx].name;
                    pool.splice(randIdx, 1);
                }
            } else { // Core Player logic: Weighted Random
                const activePool = pool.filter(c => c.weights[pIdx] > 0);
                if(activePool.length > 0) {
                    let total = activePool.reduce((sum, c) => sum + c.weights[pIdx], 0);
                    let rand = Math.random() * total;
                    let sum = 0;
                    for(let c of activePool) {
                        sum += c.weights[pIdx];
                        if(rand <= sum) { 
                            selectedCharName = c.name; 
                            const poolIdx = pool.findIndex(p => p.name === selectedCharName);
                            pool.splice(poolIdx, 1);
                            break; 
                        }
                    }
                }
            }

            const charData = characters.find(c => c.name === selectedCharName);
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <img src="${charData?.url || DEFAULT_IMG}" class="char-img" id="img-${pIdx}" onerror="this.src='${DEFAULT_IMG}'">
                <div style="flex:1">
                    <div class="player-label" style="color:var(--p${pIdx+1})">${NAMES[pIdx]}</div>
                    <select class="char-select" data-player="${pIdx}" onchange="handleDropdownChange(this)">
                        ${characters.map(c => `<option value="${c.name}" ${c.name === selectedCharName ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                </div>
            `;
            resultsDiv.appendChild(row);
        });

        validateSelection();
        document.getElementById('confirmBtn').style.display = 'block';
    }

    function handleDropdownChange(el) {
        const pIdx = el.dataset.player;
        const char = characters.find(c => c.name === el.value);
        document.getElementById(`img-${pIdx}`).src = char.url || DEFAULT_IMG;
        validateSelection();
    }

    function validateSelection() {
        const dropdowns = document.querySelectorAll('.char-select');
        const names = Array.from(dropdowns).map(d => d.value);
        const hasDupes = names.some((name, idx) => names.indexOf(name) !== idx);
        
        const confirmBtn = document.getElementById('confirmBtn');
        const errorMsg = document.getElementById('error-msg');

        if (hasDupes) {
            confirmBtn.classList.add('disabled');
            confirmBtn.disabled = true;
            errorMsg.style.display = 'block';
            dropdowns.forEach(d => {
                const isDupe = names.filter(n => n === d.value).length > 1;
                d.classList.toggle('error', isDupe);
            });
        } else {
            confirmBtn.classList.remove('disabled');
            confirmBtn.disabled = false;
            errorMsg.style.display = 'none';
            dropdowns.forEach(d => d.classList.remove('error'));
        }
    }

    function applyResults() {
        const dropdowns = document.querySelectorAll('.char-select');
        const sessionPicks = Array.from(dropdowns).map(sel => ({ 
            pIdx: parseInt(sel.dataset.player), 
            charName: sel.value 
        }));

        // Filter core players only (indices 0-3)
        const corePicks = sessionPicks.filter(s => s.pIdx < 4);
        const corePlayingIndices = corePicks.map(s => s.pIdx);

        characters.forEach(char => {
            corePlayingIndices.forEach(pIdx => {
                if (char.weights[pIdx] === 0) return;
                const wasPicked = corePicks.some(s => s.pIdx === pIdx && s.charName === char.name);
                if (wasPicked) {
                    char.weights[pIdx] = Math.max(MIN_W, char.weights[pIdx] * DECAY);
                } else {
                    char.weights[pIdx] = Math.min(MAX_W, char.weights[pIdx] * BOOST);
                }
            });
        });

        db.ref('characters_v4').set(characters);
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('results').innerHTML = `<p style="color:#28a745; text-align:center; font-weight:bold;">Weights Adjusted (Invitee Ignored)!</p>`;
    }

    function resetAllWeights() {
        if(confirm("Are you sure? This will reset Claudine, Joel, Julie, and Martin back to 100 odds for every character.")) {
            characters.forEach(c => {
                c.weights = [100, 100, 100, 100];
            });
            db.ref('characters_v4').set(characters);
            alert("Weights Reset!");
        }
    }

    // --- Standard Management Functions ---
    function handleFormSubmit() {
        const name = document.getElementById('newName').value.trim();
        const group = document.getElementById('newGroup').value.trim();
        const url = document.getElementById('newUrl').value.trim();
        if (!name) return;
        const weights = [0,1,2,3].map(i => parseFloat(document.getElementById(`w${i}`).value) || 100);

        if (editIndex > -1) characters[editIndex] = { name, group, url, weights };
        else characters.push({ name, group, url, weights });
        
        db.ref('characters_v4').set(characters);
        resetForm();
    }

    function startEdit(name) {
        editIndex = characters.findIndex(c => c.name === name);
        const c = characters[editIndex];
        document.getElementById('newName').value = c.name;
        document.getElementById('newGroup').value = c.group || '';
        document.getElementById('newUrl').value = c.url || '';
        c.weights.forEach((w, i) => document.getElementById(`w${i}`).value = Math.round(w));
        document.getElementById('formTitle').innerText = "Edit " + c.name;
        document.getElementById('cancelEdit').style.display = "block";
    }

    function resetForm() {
        editIndex = -1;
        document.querySelectorAll('.manage-section input').forEach(i => i.value = '');
        document.getElementById('formTitle').innerText = "Add/Edit Hero";
        document.getElementById('cancelEdit').style.display = "none";
    }

    function renderList() {
        const listDiv = document.getElementById('charList');
        const sorted = [...characters].sort((a,b) => (a.group || '').localeCompare(b.group || '') || a.name.localeCompare(b.name));
        const totals = [0, 1, 2, 3].map(i => characters.reduce((sum, c) => sum + c.weights[i], 0));

        listDiv.innerHTML = sorted.map(c => `
            <div class="char-item">
                <div style="display:flex; align-items:center;">
                    <img src="${c.url || DEFAULT_IMG}" class="list-thumb">
                    <div>
                        <span style="font-weight:bold; color:var(--accent); font-size:0.9rem;">${c.name}</span>
                        <div class="w-badges">
                            ${c.weights.map((w, i) => `<span class="badge" style="background:var(--p${i+1})">${totals[i] > 0 ? ((w/totals[i])*100).toFixed(1) : 0}%</span>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn-edit" onclick="startEdit('${c.name.replace(/'/g, "\\'")}')">✎</button>
                </div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
